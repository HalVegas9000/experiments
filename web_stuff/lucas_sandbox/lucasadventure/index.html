// ─── Wall rectangles for a room ──────────────────────────────────────────────
function wallRects(room) {
  const r = [];
  // North wall (with optional door gap)
  if (room.doors.N) {
    r.push({x:0,      y:0,      w:CX-DH,      h:WALL});
    r.push({x:CX+DH,  y:0,      w:W-(CX+DH),  h:WALL});
  } else { r.push({x:0,y:0,w:W,h:WALL}); }
  // South wall
  if (room.doors.S) {
    r.push({x:0,      y:H-WALL, w:CX-DH,      h:WALL});
    r.push({x:CX+DH,  y:H-WALL, w:W-(CX+DH),  h:WALL});
  } else { r.push({x:0,y:H-WALL,w:W,h:WALL}); }
  // West wall
  if (room.doors.W) {
    r.push({x:0, y:0,      w:WALL, h:CY-DH});
    r.push({x:0, y:CY+DH,  w:WALL, h:H-(CY+DH)});
  } else { r.push({x:0,y:0,w:WALL,h:H}); }
  // East wall
  if (room.doors.E) {
    r.push({x:W-WALL, y:0,      w:WALL, h:CY-DH});
    r.push({x:W-WALL, y:CY+DH,  w:WALL, h:H-(CY+DH)});
  } else { r.push({x:W-WALL,y:0,w:WALL,h:H}); }
  return r;
}

function overlaps(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ─── Collision-aware movement ─────────────────────────────────────────────────
function moveObj(obj, dx, dy, room) {
  const walls = wallRects(room);
  const hs = obj.size / 2;
  obj.x += dx;
  for (const w of walls) {
    if (overlaps(obj.x-hs, obj.y-hs, obj.size, obj.size, w.x, w.y, w.w, w.h))
      obj.x = dx > 0 ? w.x - hs : w.x + w.w + hs;
  }
  obj.y += dy;
  for (const w of walls) {
    if (overlaps(obj.x-hs, obj.y-hs, obj.size, obj.size, w.x, w.y, w.w, w.h))
      obj.y = dy > 0 ? w.y - hs : w.y + w.h + hs;
  }
}

// ─── Particle burst ──────────────────────────────────────────────────────────
function burst(x, y, color, n = 16) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                     life: 38, max: 38, r: 2 + Math.random()*3, color });
  }
}

// ─── Achievement helpers ──────────────────────────────────────────────────────
function sfxAchiev() {
  [523, 659, 784, 1047].forEach((f, i) => tone(f, 'sine', 0.22, 0.28, i * 0.09));
}

function unlockAchiev(id) {
  if (achievements[id]) return;
  achievements[id] = true;
  achievPopups.push({ id, timer: 260 });
  sfxAchiev();
}

function checkAllMainEnemiesDead() {
  if (achievements['cleanse']) return;
  for (let gy = 0; gy < GRID_H; gy++)
    for (let gx = 0; gx < GRID_W; gx++)
      for (const e of rooms[gy][gx].enemies)
        if (!e.dead) return;
  unlockAchiev('cleanse');
}

// ─── Ray to wall (for laser endpoint) ────────────────────────────────────────
function rayToWall(ox, oy, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  let tmin = Infinity;
  if (cos >  0.001) tmin = Math.min(tmin, (W - WALL - ox) / cos);
  if (cos < -0.001) tmin = Math.min(tmin, (WALL - ox) / cos);
  if (sin >  0.001) tmin = Math.min(tmin, (H - WALL - oy) / sin);
  if (sin < -0.001) tmin = Math.min(tmin, (WALL - oy) / sin);
  return { x: ox + cos * tmin, y: oy + sin * tmin };
}

// ─── Point-to-segment distance (for laser hit detection) ─────────────────────
function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / lenSq));
  return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
}

// ─── Boss update ──────────────────────────────────────────────────────────────
function updateBoss() {
  if (!boss || boss.dead) return;
  if (boss.hitTimer > 0) boss.hitTimer--;

  const hpFrac = boss.hp / boss.maxHp;
  const phase   = hpFrac > 0.667 ? 1 : hpFrac > 0.333 ? 2 : 3;
  const sMul    = phase === 1 ? 1 : phase === 2 ? 1.45 : 1.9;

  // ── Movement – slow drift, nudge toward player ────────────────────────
  const bhs = boss.size / 2;
  boss.x += boss.vx * sMul;
  boss.y += boss.vy * sMul;
  if (boss.x - bhs < WALL + 4)     { boss.x = WALL + bhs + 4;     boss.vx =  Math.abs(boss.vx); }
  if (boss.x + bhs > W - WALL - 4) { boss.x = W - WALL - bhs - 4; boss.vx = -Math.abs(boss.vx); }
  if (boss.y - bhs < WALL + 4)     { boss.y = WALL + bhs + 4;     boss.vy =  Math.abs(boss.vy); }
  if (boss.y + bhs > H - WALL - 4) { boss.y = H - WALL - bhs - 4; boss.vy = -Math.abs(boss.vy); }
  const bAng = Math.atan2(player.y - boss.y, player.x - boss.x);
  boss.vx += Math.cos(bAng) * 0.014; boss.vy += Math.sin(bAng) * 0.014;
  const bSpd = Math.hypot(boss.vx, boss.vy);
  if (bSpd > 1.8) { boss.vx = boss.vx / bSpd * 1.8; boss.vy = boss.vy / bSpd * 1.8; }

  // ── Attack 1: spawn minions ───────────────────────────────────────────
  boss.spawnTimer--;
  if (boss.spawnTimer <= 0) {
    boss.spawnTimer = (phase === 1 ? 260 : phase === 2 ? 180 : 120) + Math.floor(Math.random()*80);
    const live = bossRoom.enemies.filter(e => !e.dead).length;
    if (live < 4) {
      const count = phase === 3 ? 3 : 2;
      for (let m = 0; m < count; m++) {
        const mx = WALL + 60 + Math.random() * (W - 120 - WALL*2);
        const my = WALL + 60 + Math.random() * (H - 120 - WALL*2);
        bossRoom.enemies.push({
          type: 'patrol', x: mx, y: my,
          axis: Math.random() < 0.5 ? 'x' : 'y',
          min: WALL + 40, max: (Math.random() < 0.5 ? W : H) - WALL - 40,
          spd: 1.4 + Math.random(), dir: 1,
          size: 14, hitTimer: 0, dead: false,
        });
      }
      sfxBossRoar();
      burst(boss.x, boss.y, '#ff2200', 16);
    }
    // Periodically clean up fully-dead minions
    if (bossRoom.enemies.length > 20)
      bossRoom.enemies = bossRoom.enemies.filter(e => !e.dead);
  }

  // ── Attack 2: 8-way (or 12-way) projectile burst ──────────────────────
  boss.burstTimer--;
  if (boss.burstTimer <= 0) {
    boss.burstTimer = (phase === 1 ? 210 : phase === 2 ? 145 : 90) + Math.floor(Math.random()*60);
    const count = phase === 3 ? 12 : 8;
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      projectiles.push({ x: boss.x, y: boss.y,
                         vx: Math.cos(a) * 3.8, vy: Math.sin(a) * 3.8,
                         size: 7, color: '#ff3300' });
    }
    sfxBurstFire();
    burst(boss.x, boss.y, '#ff6600', 8);
  }

  // ── Attack 3: laser beam (phase 2+) ──────────────────────────────────
  if (phase >= 2) {
    if (boss.laserState === 'idle') {
      boss.laserTimer--;
      if (boss.laserTimer <= 0) {
        boss.laserTimer = (phase === 2 ? 340 : 210) + Math.floor(Math.random()*100);
        boss.laserState       = 'charging';
        boss.laserChargeTimer = 90;
        boss.laserAngle       = Math.atan2(player.y - boss.y, player.x - boss.x);
        sfxLaserCharge();
      }
    } else if (boss.laserState === 'charging') {
      boss.laserChargeTimer--;
      if (boss.laserChargeTimer <= 0) {
        boss.laserState     = 'firing';
        boss.laserFireTimer = 55;
        boss.laserStartX = boss.x; boss.laserStartY = boss.y;
        const end = rayToWall(boss.x, boss.y, boss.laserAngle);
        boss.laserEndX = end.x; boss.laserEndY = end.y;
        sfxLaserFire();
      }
    } else if (boss.laserState === 'firing') {
      boss.laserFireTimer--;
      if (boss.laserFireTimer <= 0) {
        boss.laserState = 'idle';
      } else if (player.iframes === 0) {
        const d = distToSegment(player.x, player.y,
                                boss.laserStartX, boss.laserStartY,
                                boss.laserEndX,   boss.laserEndY);
        if (d < player.size / 2 + 12) {
          player.hp--; player.iframes = 80;
          sfxHit(); burst(player.x, player.y, '#ff4400', 8);
          if (player.hp <= 0) { sfxDeath(); stopMusic(1.5); state = 'dead'; }
        }
      }
    }
  }

  // ── Occasional health potion drop ────────────────────────────────────
  boss.potionSpawnTimer--;
  if (boss.potionSpawnTimer <= 0) {
    boss.potionSpawnTimer = 380 + Math.floor(Math.random() * 160);
    const live = bossRoomPotions.filter(p => !p.picked).length;
    if (live < 2) {
      bossRoomPotions.push({
        x: WALL + 60 + Math.random() * (W - 120 - WALL * 2),
        y: WALL + 60 + Math.random() * (H - 120 - WALL * 2),
        picked: false,
      });
      burst(CX, CY, '#ff4488', 10);
    }
  }

  // ── Boss touch damage ────────────────────────────────────────────────
  if (player.iframes === 0) {
    const d = Math.hypot(player.x - boss.x, player.y - boss.y);
    if (d < (player.size + boss.size) / 2) {
      player.hp--; player.iframes = 80;
      sfxHit(); burst(player.x, player.y, '#e74c3c', 8);
      const ang = Math.atan2(player.y - boss.y, player.x - boss.x);
      const phs = player.size / 2;
      player.x = Math.max(WALL+phs, Math.min(W-WALL-phs, player.x + Math.cos(ang)*50));
      player.y = Math.max(WALL+phs, Math.min(H-WALL-phs, player.y + Math.sin(ang)*50));
      if (player.hp <= 0) { sfxDeath(); stopMusic(1.5); state = 'dead'; }
    }
  }
}

// ─── Begin room transition ────────────────────────────────────────────────────
function beginTrans(dir) {
  if (trans) return;

  // Player entry position in new room (opposite side of door)
  const hs = player.size / 2;
  let px = player.x, py = player.y;
  if (dir === 'N') py = H - WALL - hs - 2;
  if (dir === 'S') py = WALL + hs + 2;
  if (dir === 'W') px = W - WALL - hs - 2;
  if (dir === 'E') px = WALL + hs + 2;

  // Boss room routing
  if (dir === 'S' && curRoom === rooms[2][2] && bossUnlocked) {
    trans = { nextRoom: bossRoom, playerTo: {x: px, y: py}, t: 0 };
    projectiles = []; return;
  }
  if (dir === 'N' && curRoom === bossRoom) {
    trans = { nextRoom: rooms[2][2], playerTo: {x: px, y: py}, t: 0 };
    projectiles = []; return;
  }
  if (dir === 'W' && curRoom === rooms[1][0] && wallBroken) {
    trans = { nextRoom: secretRoom, playerTo: {x: W - WALL - player.size/2 - 2, y: py}, t: 0 };
    projectiles = []; return;
  }
  if (dir === 'E' && curRoom === secretRoom) {
    trans = { nextRoom: rooms[1][0], playerTo: {x: WALL + player.size/2 + 2, y: py}, t: 0 };
    projectiles = []; return;
  }

  let ngx = curRoom.gx, ngy = curRoom.gy;
  if (dir === 'N') ngy--;
  if (dir === 'S') ngy++;
  if (dir === 'W') ngx--;
  if (dir === 'E') ngx++;
  if (ngx < 0 || ngx >= GRID_W || ngy < 0 || ngy >= GRID_H) return;

  trans = { nextRoom: rooms[ngy][ngx], playerTo: {x: px, y: py}, t: 0 };
  projectiles = [];
}

// ─── Attack hitbox ────────────────────────────────────────────────────────────
function attackHitbox() {
  const reach = 52, wide = 40, hs = player.size / 2;
  switch (player.facing) {
    case 'up':    return { x: player.x - wide/2, y: player.y - hs - reach, w: wide, h: reach };
    case 'down':  return { x: player.x - wide/2, y: player.y + hs,         w: wide, h: reach };
    case 'left':  return { x: player.x - hs - reach, y: player.y - wide/2, w: reach, h: wide };
    case 'right': return { x: player.x + hs,          y: player.y - wide/2, w: reach, h: wide };
  }
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update() {
  frame++;

  // Transition animation
  if (trans) {
    trans.t += 0.065;
    if (trans.t >= 1) {
      const wasInBossRoom = curRoom === bossRoom;
      curRoom = trans.nextRoom;
      curRoom.visited = true;
      player.x = trans.playerTo.x;
      player.y = trans.playerTo.y;
      trans = null;
      const nowInBossRoom = curRoom === bossRoom;
      if (nowInBossRoom !== wasInBossRoom && _ac) switchMusic(nowInBossRoom);
    }
    return;
  }

  if (state !== 'playing') return;

  // ── Player movement ────────────────────────────────────────────────────
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= player.spd;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += player.spd;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= player.spd;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += player.spd;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  if      (dx < 0) player.facing = 'left';
  else if (dx > 0) player.facing = 'right';
  else if (dy < 0) player.facing = 'up';
  else if (dy > 0) player.facing = 'down';

  moveObj(player, dx, dy, curRoom);
  if (player.iframes > 0) player.iframes--;
  if (player.attackTimer > 0) player.attackTimer--;
  if (bowCooldown > 0) bowCooldown--;

  // ── Sword attack ───────────────────────────────────────────────────────
  if (attackPressed && player.hasSword && player.attackTimer === 0) {
    player.attackTimer = 20;
    const hb = attackHitbox();
    for (const e of curRoom.enemies) {
      if (!e.dead && overlaps(e.x - e.size/2, e.y - e.size/2, e.size, e.size,
                              hb.x, hb.y, hb.w, hb.h)) {
        e.dead = true;
        sfxKill();
        burst(e.x, e.y, '#ff4422', 12);
        burst(e.x, e.y, '#ffaa00', 6);
        if (curRoom !== bossRoom) checkAllMainEnemiesDead();
      }
    }
    // Boss hit
    if (curRoom === bossRoom && boss && !boss.dead && boss.hitTimer === 0) {
      if (overlaps(boss.x - boss.size/2, boss.y - boss.size/2, boss.size, boss.size,
                   hb.x, hb.y, hb.w, hb.h)) {
        boss.hp -= 2;
        boss.hitTimer = 28;
        sfxBossHit();
        burst(boss.x, boss.y, '#ff4422', 8);
        if (boss.hp <= 0) {
          boss.dead = true;
          burst(boss.x, boss.y, '#ff4422', 30);
          burst(boss.x, boss.y, '#ffaa00', 20);
          burst(boss.x, boss.y, '#ffffff', 14);
          unlockAchiev('boss');
          sfxWin(); stopMusic(1.0); state = 'won'; attackPressed = false; return;
        }
      }
    }
    // Deflect projectiles caught in the swing
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (overlaps(p.x - p.size, p.y - p.size, p.size*2, p.size*2, hb.x, hb.y, hb.w, hb.h)) {
        burst(p.x, p.y, '#cc88ff', 6);
        projectiles.splice(i, 1);
      }
    }
  }
  attackPressed = false;

  // ── Room transition check ──────────────────────────────────────────────
  const hs = player.size / 2;
  const inXGap = player.x > CX - DH + hs && player.x < CX + DH - hs;
  const inYGap = player.y > CY - DH + hs && player.y < CY + DH - hs;

  if      (curRoom.doors.N && player.y - hs < WALL     && inXGap) beginTrans('N');
  else if (curRoom.doors.S && player.y + hs > H - WALL && inXGap) beginTrans('S');
  else if (curRoom.doors.W && player.x - hs < WALL     && inYGap) beginTrans('W');
  else if (curRoom.doors.E && player.x + hs > W - WALL && inYGap) beginTrans('E');

  // ── Sword pickup ───────────────────────────────────────────────────────
  if (!sword.picked && sword.room === curRoom) {
    if (Math.hypot(player.x - sword.x, player.y - sword.y) < player.size / 2 + 14) {
      sword.picked = true;
      player.hasSword = true;
      sfxSword();
      unlockAchiev('sword');
      burst(sword.x, sword.y, '#88ccff', 14);
      burst(sword.x, sword.y, '#ffffff', 6);
    }
  }

  // ── Potion pickup ──────────────────────────────────────────────────────
  if (!potion.picked && potion.room === curRoom) {
    if (Math.hypot(player.x - potion.x, player.y - potion.y) < player.size / 2 + 14) {
      potion.picked = true;
      player.hp = Math.min(player.maxHp, player.hp + 1);
      sfxHeal();
      unlockAchiev('potion');
      burst(potion.x, potion.y, '#ff4488', 14);
      burst(potion.x, potion.y, '#ffaacc', 6);
    }
  }

  // ── Boss room potion pickups ───────────────────────────────────────────
  if (curRoom === bossRoom) {
    for (const bp of bossRoomPotions) {
      if (!bp.picked && Math.hypot(player.x - bp.x, player.y - bp.y) < player.size / 2 + 14) {
        bp.picked = true;
        player.hp = Math.min(player.maxHp, player.hp + 1);
        sfxHeal();
        burst(bp.x, bp.y, '#ff4488', 14);
        burst(bp.x, bp.y, '#ffaacc', 6);
      }
    }
  }

  // ── Bow pickup ─────────────────────────────────────────────────────────
  if (!bow.picked && bow.room === curRoom) {
    if (Math.hypot(player.x - bow.x, player.y - bow.y) < player.size / 2 + 16) {
      bow.picked = true;
      player.hasBow = true;
      sfxBowPickup();
      unlockAchiev('bow');
      burst(bow.x, bow.y, '#d4a020', 14);
      burst(bow.x, bow.y, '#ffe080', 6);
    }
  }

  // ── Bow shoot ──────────────────────────────────────────────────────────
  if (shootPressed && player.hasBow && bowCooldown === 0) {
    bowCooldown = 18;
    const angles = { right: 0, down: Math.PI/2, left: Math.PI, up: -Math.PI/2 };
    const a = angles[player.facing];
    const spd = 7.5;
    projectiles.push({
      type: 'arrow',
      x: player.x + Math.cos(a) * (player.size / 2 + 4),
      y: player.y + Math.sin(a) * (player.size / 2 + 4),
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      size: 5, color: '#c8a050',
    });
    sfxBowShoot();
  }
  shootPressed = false;

  // ── Enemies ────────────────────────────────────────────────────────────
  for (const e of curRoom.enemies) {
    if (e.dead) continue;

    if (e.type === 'beetle') {
      // Beetle: chases the player
      const bAngle = Math.atan2(player.y - e.y, player.x - e.x);
      moveObj(e, Math.cos(bAngle) * e.spd, Math.sin(bAngle) * e.spd, curRoom);
    } else if (e.type === 'octo') {
      // Octopus: stationary, shoots toward player on a timer
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootInterval;
        const ddx = player.x - e.x, ddy = player.y - e.y;
        const dist = Math.hypot(ddx, ddy);
        if (dist > 0) {
          sfxShoot();
          projectiles.push({ x: e.x, y: e.y,
                             vx: ddx / dist * 3.5, vy: ddy / dist * 3.5, size: 6 });
        }
      }
    } else {
      // Patrol enemy
      if (e.axis === 'x') {
        e.x += e.spd * e.dir;
        if (e.x > e.max || e.x < e.min) {
          e.dir *= -1;
          e.x = Math.max(e.min, Math.min(e.max, e.x));
        }
      } else {
        e.y += e.spd * e.dir;
        if (e.y > e.max || e.y < e.min) {
          e.dir *= -1;
          e.y = Math.max(e.min, Math.min(e.max, e.y));
        }
      }
    }

    if (e.hitTimer > 0) e.hitTimer--;

    // Touch collision with player (both types)
    if (player.iframes === 0) {
      const dist = Math.hypot(player.x - e.x, player.y - e.y);
      if (dist < (player.size + e.size) / 2) {
        player.hp--;
        player.iframes = 80;
        e.hitTimer = 12;
        burst(player.x, player.y, '#e74c3c', 8);
        if (player.hp <= 0) { sfxDeath(); stopMusic(1.5); state = 'dead'; return; }
        sfxHit();
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        player.x = Math.max(WALL + hs, Math.min(W - WALL - hs, player.x + Math.cos(ang) * 36));
        player.y = Math.max(WALL + hs, Math.min(H - WALL - hs, player.y + Math.sin(ang) * 36));
      }
    }
  }

  // ── Boss ───────────────────────────────────────────────────────────────
  if (curRoom === bossRoom) { updateBoss(); if (state !== 'playing') return; }

  // ── Projectiles ────────────────────────────────────────────────────────
  const pWalls = wallRects(curRoom);
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;

    // Wall collision
    let hitWall = false;
    for (const w of pWalls) {
      if (overlaps(p.x - p.size, p.y - p.size, p.size*2, p.size*2, w.x, w.y, w.w, w.h)) {
        hitWall = true; break;
      }
    }

    // Cracked wall check — arrow hits the west wall crack in rooms[1][0]
    if (p.type === 'arrow' && !wallBroken && curRoom === rooms[1][0]
        && hitWall && p.x <= WALL + p.size && p.y >= CY - 30 && p.y <= CY + 30) {
      wallBroken = true;
      rooms[1][0].doors.W = true;
      secretRoom.doors.E  = true;
      sfxWallBreak();
      burst(p.x, p.y, '#cc99ff', 18);
      burst(p.x, p.y, '#ffffff', 8);
      projectiles.splice(i, 1);
      continue;
    }

    if (hitWall || p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
      if (hitWall) sfxProjectileHit();
      projectiles.splice(i, 1);
      continue;
    }

    // Arrow hits enemies / boss — does not hurt player
    if (p.type === 'arrow') {
      let hit = false;
      for (const e of curRoom.enemies) {
        if (!e.dead && Math.hypot(p.x - e.x, p.y - e.y) < e.size / 2 + p.size) {
          e.dead = true; sfxArrowHit();
          burst(e.x, e.y, '#ff4422', 10); burst(e.x, e.y, '#ffaa00', 5);
          if (curRoom !== bossRoom) checkAllMainEnemiesDead();
          hit = true; break;
        }
      }
      if (!hit && curRoom === bossRoom && boss && !boss.dead && boss.hitTimer === 0) {
        if (Math.hypot(p.x - boss.x, p.y - boss.y) < boss.size / 2 + p.size) {
          boss.hp--; boss.hitTimer = 28;
          sfxBossHit(); burst(boss.x, boss.y, '#ff4422', 8);
          if (boss.hp <= 0) {
            boss.dead = true;
            burst(boss.x, boss.y, '#ff4422', 30);
            burst(boss.x, boss.y, '#ffaa00', 20);
            burst(boss.x, boss.y, '#ffffff', 14);
            unlockAchiev('boss');
            sfxWin(); stopMusic(1.0); state = 'won'; return;
          }
          hit = true;
        }
      }
      if (hit) projectiles.splice(i, 1);
      continue;
    }

    // Enemy projectiles — hurt player
    if (player.iframes === 0 && Math.hypot(p.x - player.x, p.y - player.y) < player.size/2 + p.size) {
      player.hp--;
      player.iframes = 80;
      burst(p.x, p.y, '#aa44ff', 8);
      projectiles.splice(i, 1);
      if (player.hp <= 0) { sfxDeath(); state = 'dead'; return; }
      sfxHit();
    }
  }

  // ── Hat pickup ─────────────────────────────────────────────────────────
  if (curRoom === secretRoom && !hat.picked) {
    if (Math.hypot(player.x - hat.x, player.y - hat.y) < player.size / 2 + 16) {
      hat.picked = true;
      player.hasHat = true;
      sfxHatPickup();
      unlockAchiev('hat');
      burst(hat.x, hat.y, '#cc88ff', 14);
      burst(hat.x, hat.y, '#ffffff', 6);
    }
  }

  // ── Star collection ────────────────────────────────────────────────────
  for (const s of curRoom.stars) {
    if (!s.collected && Math.hypot(player.x - s.x, player.y - s.y) < hs + 14) {
      s.collected = true;
      starsGot++;
      sfxStar();
      burst(s.x, s.y, '#ffd700');
      burst(s.x, s.y, '#fff', 6);
      if (starsGot >= TOTAL_STARS && !bossUnlocked) {
        bossUnlocked = true;
        bossRoom.doors.N  = true;
        rooms[2][2].doors.S = true;
        announceTimer = 260;
        sfxUnlock();
        unlockAchiev('stars');
      }
    }
  }

  // ── Announce timer ─────────────────────────────────────────────────────
  if (announceTimer > 0) announceTimer--;

  // ── Achievement popup timers ───────────────────────────────────────────
  for (let i = achievPopups.length - 1; i >= 0; i--) {
    if (--achievPopups[i].timer <= 0) achievPopups.splice(i, 1);
  }

  // ── Particles ──────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    if (--p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
const TILE = 40;

function drawFloor() {
  if (curRoom && curRoom.isSecretRoom) {
    // Mystic purple stone
    for (let ty = 0; ty * TILE < H; ty++) {
      for (let tx = 0; tx * TILE < W; tx++) {
        ctx.fillStyle = (tx + ty) % 2 === 0 ? '#180a28' : '#1d0d32';
        ctx.fillRect(tx * TILE, ty * TILE, TILE, TILE);
      }
    }
    ctx.strokeStyle = 'rgba(140,80,255,0.18)';
    ctx.lineWidth = 1;
    for (let ty = 0; ty * TILE < H; ty++) {
      for (let tx = 0; tx * TILE < W; tx++) {
        ctx.strokeRect(tx * TILE + 0.5, ty * TILE + 0.5, TILE - 1, TILE - 1);
      }
    }
    // Drifting sparkles
    for (let i = 0; i < 6; i++) {
      const sx = 90 + i * 85;
      const sy = 80 + ((i * 73 + frame * 0.4) % (H - 100));
      const t  = Math.sin(frame * 0.07 + i * 1.5);
      if (t > 0.4) {
        ctx.fillStyle = `rgba(200,160,255,${(t - 0.4) * 0.7})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5 + t * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    return;
  }
  if (curRoom && curRoom.isBossRoom) {
    // Dark lava-stone floor
    for (let ty = 0; ty * TILE < H; ty++) {
      for (let tx = 0; tx * TILE < W; tx++) {
        ctx.fillStyle = (tx + ty) % 2 === 0 ? '#1a0808' : '#1f0b0b';
        ctx.fillRect(tx * TILE, ty * TILE, TILE, TILE);
      }
    }
    ctx.strokeStyle = 'rgba(200,30,0,0.18)';
    ctx.lineWidth = 1;
    for (let ty = 0; ty * TILE < H; ty++) {
      for (let tx = 0; tx * TILE < W; tx++) {
        ctx.strokeRect(tx * TILE + 0.5, ty * TILE + 0.5, TILE - 1, TILE - 1);
      }
    }
    // Faint lava glow pools
    [[160,200],[480,340],[320,380],[100,120],[540,100]].forEach(([px,py]) => {
      const g = ctx.createRadialGradient(px,py,0,px,py,40+14*Math.sin(frame*0.05+px));
      g.addColorStop(0,  'rgba(200,30,0,0.22)');
      g.addColorStop(1,  'rgba(200,30,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px,py,50,0,Math.PI*2); ctx.fill();
    });
    return;
  }
  for (let ty = 0; ty * TILE < H; ty++) {
    for (let tx = 0; tx * TILE < W; tx++) {
      // Subtle checkerboard grass
      ctx.fillStyle = (tx + ty) % 2 === 0 ? '#3a6b42' : '#3f7348';
      ctx.fillRect(tx * TILE, ty * TILE, TILE, TILE);
    }
  }
  // Subtle inner border shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let ty = 0; ty * TILE < H; ty++) {
    for (let tx = 0; tx * TILE < W; tx++) {
      ctx.strokeRect(tx * TILE + 0.5, ty * TILE + 0.5, TILE - 1, TILE - 1);
    }
  }
}

function drawWalls(room) {
  const rects = wallRects(room);
  for (const r of rects) {
    // Stone base
    ctx.fillStyle = '#6b5b45';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    // Brick pattern
    ctx.strokeStyle = '#4a3e2d';
    ctx.lineWidth = 1.5;
    const BW = 32, BH = 16;
    for (let row = 0; row * BH < r.h; row++) {
      const off = row % 2 === 0 ? 0 : BW / 2;
      for (let col = -1; col * BW < r.w; col++) {
        const bx = Math.max(r.x + col * BW + off, r.x);
        const by = Math.max(r.y + row * BH, r.y);
        const bw = Math.min(r.x + (col+1) * BW + off, r.x + r.w) - bx;
        const bh = Math.min(r.y + (row+1) * BH, r.y + r.h) - by;
        if (bw > 0 && bh > 0) ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      }
    }
    // Highlight edge
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.fillRect(r.x, r.y, r.w, 2);
    // Shadow edge
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(r.x, r.y + r.h - 2, r.w, 2);
  }

  // Door passages (dark openings)
  ctx.fillStyle = '#1a2e1a';
  if (room.doors.N) ctx.fillRect(CX - DH, 0,      DOOR_W, WALL);
  if (room.doors.S) ctx.fillRect(CX - DH, H-WALL, DOOR_W, WALL);
  if (room.doors.W) ctx.fillRect(0,      CY - DH, WALL, DOOR_W);
  if (room.doors.E) ctx.fillRect(W-WALL, CY - DH, WALL, DOOR_W);

  // Torches at wall corners (decoration)
  const torchPositions = [
    [WALL + 10, WALL + 10],
    [W - WALL - 10, WALL + 10],
    [WALL + 10, H - WALL - 10],
    [W - WALL - 10, H - WALL - 10],
  ];
  for (const [tx, ty] of torchPositions) {
    const flicker = 0.7 + 0.3 * Math.sin(frame * 0.18 + tx);
    ctx.save();
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 16 * flicker;
    ctx.fillStyle = `rgba(255,${Math.floor(150 + 80*flicker)},0,${flicker})`;
    ctx.beginPath();
    ctx.arc(tx, ty, 5 * flicker, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawStar(s) {
  if (s.collected) return;
  const pulse = 1 + 0.12 * Math.sin(frame * 0.045 + s.x * 0.1);
  const r = 11 * pulse;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 14 + 6 * Math.sin(frame * 0.07);

  // 5-point star
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI / 5) - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.42;
    const x = Math.cos(a) * rad, y = Math.sin(a) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = '#ffe545';
  ctx.fill();
  ctx.strokeStyle = '#ff9900';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawSwordItem() {
  if (sword.picked || sword.room !== curRoom) return;
  const { x, y } = sword;
  const bob = Math.sin(frame * 0.07) * 3;

  ctx.save();
  ctx.translate(x, y + bob);
  // Glow
  ctx.shadowColor = '#66aaff';
  ctx.shadowBlur = 14 + 6 * Math.sin(frame * 0.08);

  // Blade (diagonal, top-right to bottom-left)
  ctx.strokeStyle = '#c8e8ff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-14, 14);
  ctx.lineTo(14, -14);
  ctx.stroke();

  // Guard (crosspiece)
  ctx.strokeStyle = '#d4aa50';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-6, -6);
  ctx.lineTo(6, 6);
  ctx.stroke();

  // Handle
  ctx.strokeStyle = '#8b5e3c';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-14, 14);
  ctx.lineTo(-20, 20);
  ctx.stroke();

  // Pommel
  ctx.fillStyle = '#d4aa50';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(-20, 20, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawAttack() {
  if (!player.hasSword || player.attackTimer <= 0) return;
  const t = player.attackTimer / 20; // 1 → 0

  ctx.save();
  ctx.translate(player.x, player.y);

  // Sword direction
  const angles = { right: 0, down: Math.PI/2, left: Math.PI, up: -Math.PI/2 };
  const baseAngle = angles[player.facing];

  // Slash arc: sweeps 90° around the facing direction
  const sweepStart = baseAngle - Math.PI/2 * t;
  const sweepEnd   = baseAngle + Math.PI/2 * (1 - t);
  const arcR = 46;

  ctx.globalAlpha = t * 0.7;
  ctx.strokeStyle = '#aaddff';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, arcR, sweepStart, sweepEnd);
  ctx.stroke();

  // Sword blade drawn at current sweep position
  const bladeAngle = sweepStart + (sweepEnd - sweepStart) * 0.5;
  const bx = Math.cos(bladeAngle), by = Math.sin(bladeAngle);
  ctx.globalAlpha = 0.9 * t;
  ctx.strokeStyle = '#e8f4ff';
  ctx.lineWidth = 3;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(bx * (player.size / 2), by * (player.size / 2));
  ctx.lineTo(bx * (arcR + 10), by * (arcR + 10));
  ctx.stroke();

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBeetle(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  // Always face the player
  ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x));
  if (e.hitTimer > 0 && e.hitTimer % 3 < 2) ctx.globalAlpha = 0.35;

  const s = e.size / 2; // 10

  // ── Legs (3 pairs, drawn before body) ────────────────────────────────
  ctx.strokeStyle = '#1a3a08';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  for (const lx of [-s * 0.55, s * 0.0, s * 0.45]) {
    ctx.beginPath();
    ctx.moveTo(lx, -s * 0.75);
    ctx.lineTo(lx - s * 0.25, -s * 1.55);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(lx, s * 0.75);
    ctx.lineTo(lx - s * 0.25, s * 1.55);
    ctx.stroke();
  }

  // ── Elytra (wing cases) ───────────────────────────────────────────────
  ctx.shadowColor = '#6ab830';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#2d5e14';
  ctx.beginPath();
  ctx.ellipse(-s * 0.1, 0, s * 0.88, s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Shine highlights on each wing case
  ctx.fillStyle = 'rgba(160,255,80,0.16)';
  ctx.beginPath();
  ctx.ellipse(-s * 0.28, -s * 0.42, s * 0.38, s * 0.28, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-s * 0.28,  s * 0.42, s * 0.38, s * 0.28,  0.3, 0, Math.PI * 2);
  ctx.fill();

  // Elytra seam line (centre split)
  ctx.strokeStyle = '#1a3a08';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(s * 0.72, 0);
  ctx.lineTo(-s * 0.98, 0);
  ctx.stroke();

  // ── Pronotum (thorax shield) ──────────────────────────────────────────
  ctx.fillStyle = '#244e10';
  ctx.beginPath();
  ctx.ellipse(s * 0.82, 0, s * 0.4, s * 0.52, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Head ─────────────────────────────────────────────────────────────
  ctx.fillStyle = '#1a3a08';
  ctx.beginPath();
  ctx.ellipse(s * 1.22, 0, s * 0.33, s * 0.30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (glowing amber)
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#cc4400';
  ctx.beginPath(); ctx.arc(s * 1.27, -s * 0.2, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 1.27,  s * 0.2, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // ── Antennae (curved) ────────────────────────────────────────────────
  ctx.strokeStyle = '#1a3a08';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(s * 1.48, -s * 0.17);
  ctx.quadraticCurveTo(s * 1.85, -s * 0.55, s * 2.15, -s * 0.9);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 1.48,  s * 0.17);
  ctx.quadraticCurveTo(s * 1.85,  s * 0.55, s * 2.15,  s * 0.9);
  ctx.stroke();
  // Antenna tips
  ctx.fillStyle = '#1a3a08';
  ctx.beginPath(); ctx.arc(s * 2.15, -s * 0.9, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 2.15,  s * 0.9, 2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawPotionAt(x, y) {
  const bob = Math.sin(frame * 0.06 + x * 0.01) * 3;
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.shadowColor = '#ff4488';
  ctx.shadowBlur = 12 + 5 * Math.sin(frame * 0.08);
  ctx.fillStyle = '#cc1155';
  ctx.beginPath(); ctx.ellipse(0, 5, 9, 11, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,150,180,0.45)';
  ctx.beginPath(); ctx.ellipse(-3, 2, 4, 6, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aa0044'; ctx.fillRect(-3, -8, 6, 7);
  ctx.fillStyle = '#c8a060';
  ctx.beginPath(); ctx.roundRect(-3, -14, 6, 7, 2); ctx.fill();
  ctx.restore();
}

function drawPotionItem() {
  if (potion.picked || potion.room !== curRoom) return;
  drawPotionAt(potion.x, potion.y);
}

function drawBowItem() {
  if (bow.picked || bow.room !== curRoom) return;
  const { x, y } = bow;
  const bob = Math.sin(frame * 0.065) * 3;

  ctx.save();
  ctx.translate(x, y + bob);
  ctx.shadowColor = '#d4a020';
  ctx.shadowBlur  = 12 + 5 * Math.sin(frame * 0.09);

  // Bow arc (a curved stave)
  ctx.strokeStyle = '#a06820';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, 13, -Math.PI * 0.72, Math.PI * 0.72);
  ctx.stroke();

  // String
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#e8ddb0';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(Math.cos(-Math.PI*0.72)*13, Math.sin(-Math.PI*0.72)*13);
  ctx.lineTo(Math.cos( Math.PI*0.72)*13, Math.sin( Math.PI*0.72)*13);
  ctx.stroke();

  // Arrow on the bow (resting)
  ctx.strokeStyle = '#c8a050';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(10, 0); ctx.stroke();
  // Arrowhead
  ctx.fillStyle = '#8888bb';
  ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(6,-3); ctx.lineTo(6,3); ctx.closePath(); ctx.fill();
  // Fletching
  ctx.strokeStyle = '#cc4444'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-13,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-13, 4); ctx.stroke();

  ctx.restore();
}

function drawOctopus(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.hitTimer > 0 && e.hitTimer % 3 < 2) ctx.globalAlpha = 0.35;

  const s = e.size / 2;  // 12
  const bob = Math.sin(frame * 0.07 + e.x * 0.05) * 2;

  // Tentacles (6, wiggly)
  ctx.strokeStyle = '#7d3c98';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const baseA = (i / 6) * Math.PI * 2;
    const wave  = Math.sin(frame * 0.1 + i * 1.4) * 6;
    const mx = Math.cos(baseA) * s * 1.6 + Math.sin(baseA) * wave;
    const my = bob + Math.sin(baseA) * s * 1.6 - Math.cos(baseA) * wave;
    const ex = Math.cos(baseA) * s * 2.8 + Math.sin(baseA) * wave * 0.3;
    const ey = bob + Math.sin(baseA) * s * 2.8 - Math.cos(baseA) * wave * 0.3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(baseA) * s * 0.85, bob + Math.sin(baseA) * s * 0.85);
    ctx.quadraticCurveTo(mx, my, ex, ey);
    ctx.stroke();
  }

  // Body
  ctx.shadowColor = '#9b59b6';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#8e44ad';
  ctx.beginPath();
  ctx.arc(0, bob, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#6c3483';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Mantle dome on top
  ctx.fillStyle = '#a569bd';
  ctx.beginPath();
  ctx.ellipse(0, bob - s * 0.45, s * 0.72, s * 0.88, 0, Math.PI, 0);
  ctx.fill();

  // Eyes (track the player)
  const pdx = player.x - e.x, pdy = player.y - e.y;
  const pa  = Math.atan2(pdy, pdx);
  const po  = 2.5;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-s*0.36, bob - s*0.12, s*0.26, s*0.30, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse( s*0.36, bob - s*0.12, s*0.26, s*0.30, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-s*0.36 + Math.cos(pa)*po, bob - s*0.12 + Math.sin(pa)*po, s*0.14, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc( s*0.36 + Math.cos(pa)*po, bob - s*0.12 + Math.sin(pa)*po, s*0.14, 0, Math.PI*2);
  ctx.fill();

  // Charge-up ring when about to fire
  if (e.shootTimer < 35) {
    const charge = 1 - e.shootTimer / 35;
    ctx.globalAlpha = (ctx.globalAlpha || 1) * charge * 0.85;
    ctx.shadowColor = '#cc44ff';
    ctx.shadowBlur = 18 * charge;
    ctx.strokeStyle = `rgba(180,80,255,${charge})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, bob, s + 5 + charge * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawBoss() {
  if (!boss || boss.dead || curRoom !== bossRoom) return;
  const b = boss;
  const s = b.size / 2;  // 36
  const hpFrac = b.hp / b.maxHp;
  const phase  = hpFrac > 0.667 ? 1 : hpFrac > 0.333 ? 2 : 3;
  const flash  = b.hitTimer > 0 && b.hitTimer % 4 < 2;
  const auraC  = phase === 3 ? '#ff0000' : phase === 2 ? '#cc2200' : '#881100';

  ctx.save();
  ctx.translate(b.x, b.y);
  if (flash) ctx.globalAlpha = 0.3;

  // ── Outer pulsing aura ───────────────────────────────────────────────
  const auraR = s + 14 + 7 * Math.sin(frame * 0.09);
  ctx.shadowColor = auraC;
  ctx.shadowBlur  = 36;
  ctx.fillStyle   = `rgba(${phase===3?'255,0,0':phase===2?'180,20,0':'100,0,0'},0.16)`;
  ctx.beginPath(); ctx.arc(0, 0, auraR, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // ── Wings ────────────────────────────────────────────────────────────
  const wf = Math.sin(frame * 0.13) * 0.18; // flap offset
  ctx.fillStyle = phase === 3 ? '#3d0000' : '#1e0606';
  // left wing
  ctx.beginPath();
  ctx.moveTo(-s*0.4, -s*0.3);
  ctx.bezierCurveTo(-s*2.3, -s*1.5 + wf*s, -s*3.0, s*0.15, -s*1.7, s*0.85);
  ctx.bezierCurveTo(-s*1.1, s*0.45, -s*0.7, s*0.15, -s*0.4, s*0.3);
  ctx.closePath(); ctx.fill();
  // right wing
  ctx.beginPath();
  ctx.moveTo(s*0.4, -s*0.3);
  ctx.bezierCurveTo(s*2.3, -s*1.5 + wf*s, s*3.0, s*0.15, s*1.7, s*0.85);
  ctx.bezierCurveTo(s*1.1, s*0.45, s*0.7, s*0.15, s*0.4, s*0.3);
  ctx.closePath(); ctx.fill();
  // wing membrane ribs
  ctx.strokeStyle = 'rgba(200,40,40,0.45)'; ctx.lineWidth = 1.2;
  [[-0.4,-0.12,-2.2,-0.9+wf], [-0.4,0.05,-2.6,0.35], [-0.4,0.25,-1.9,0.8]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-x1*s,y1*s); ctx.lineTo(-x2*s,y2*s); ctx.stroke();
  });

  // ── Body ─────────────────────────────────────────────────────────────
  ctx.shadowColor = auraC; ctx.shadowBlur = 18;
  ctx.fillStyle   = phase === 3 ? '#4d0505' : '#2e0606';
  ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = phase === 3 ? '#880000' : '#4a0e0e'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Phase 3 damage cracks
  if (phase === 3) {
    ctx.strokeStyle = 'rgba(255,100,0,0.65)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-s*0.5,-s*0.3); ctx.lineTo(-s*0.1,s*0.25); ctx.lineTo(s*0.3,s*0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.4,-s*0.55); ctx.lineTo(s*0.1,-s*0.1); ctx.lineTo(s*0.55,s*0.35); ctx.stroke();
  }

  // ── Crown of 5 horns ────────────────────────────────────────────────
  ctx.fillStyle = '#140000';
  const hornDefs = [
    {a:-Math.PI/2, l:s*1.65, w:6},  // centre — tallest
    {a:-Math.PI/2 - 0.38, l:s*1.2, w:5},
    {a:-Math.PI/2 + 0.38, l:s*1.2, w:5},
    {a:-Math.PI/2 - 0.72, l:s*0.9, w:4},
    {a:-Math.PI/2 + 0.72, l:s*0.9, w:4},
  ];
  for (const {a,l,w} of hornDefs) {
    const bx = Math.cos(a)*s*0.8, by = Math.sin(a)*s*0.8;
    const tx = Math.cos(a)*l,     ty = Math.sin(a)*l;
    const nx = Math.cos(a+Math.PI/2), ny = Math.sin(a+Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(bx + nx*w, by + ny*w);
    ctx.lineTo(tx, ty);
    ctx.lineTo(bx - nx*w, by - ny*w);
    ctx.closePath(); ctx.fill();
  }

  // ── Three eyes (track player) ────────────────────────────────────────
  const eyeA = Math.atan2(player.y - b.y, player.x - b.x);
  const ep = 2.8; // pupil offset
  const eyeDefs = [{ex:-s*0.38, ey:-s*0.08},{ex:0,ey:-s*0.24},{ex:s*0.38,ey:-s*0.08}];
  for (const [idx, {ex, ey}] of eyeDefs.entries()) {
    const isCentre = idx === 1;
    const laserGlow = isCentre && (b.laserState === 'charging' || b.laserState === 'firing');
    // Sclera
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(ex, ey, s*0.23, s*0.27, 0, 0, Math.PI*2); ctx.fill();
    // Charging glow on centre eye
    if (laserGlow) {
      const chargeT = b.laserState === 'firing' ? 1 : 1 - b.laserChargeTimer / 90;
      ctx.shadowColor = '#ff7700'; ctx.shadowBlur = 22 * chargeT;
      ctx.fillStyle = `rgba(255,${Math.floor(80+100*chargeT)},0,${0.5+chargeT*0.5})`;
      ctx.beginPath(); ctx.ellipse(ex, ey, s*0.23*(1+chargeT*0.5), s*0.27*(1+chargeT*0.5), 0, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    // Pupil
    ctx.fillStyle = laserGlow ? '#ff3300' : '#111';
    ctx.beginPath(); ctx.arc(ex+Math.cos(eyeA)*ep, ey+Math.sin(eyeA)*ep, s*0.13, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBossLaser() {
  if (!boss || boss.laserState === 'idle' || curRoom !== bossRoom) return;
  ctx.save();
  if (boss.laserState === 'charging') {
    // Dashed targeting line
    const chargeT = 1 - boss.laserChargeTimer / 90;
    const end = rayToWall(boss.x, boss.y, boss.laserAngle);
    ctx.strokeStyle = `rgba(255,120,0,${chargeT * 0.65})`;
    ctx.lineWidth   = 2 + chargeT * 3;
    ctx.setLineDash([10, 10]);
    ctx.lineDashOffset = -(frame * 2.5);
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 10 * chargeT;
    ctx.beginPath(); ctx.moveTo(boss.x, boss.y); ctx.lineTo(end.x, end.y); ctx.stroke();
    ctx.setLineDash([]);
  } else if (boss.laserState === 'firing') {
    const t = boss.laserFireTimer / 55;   // 1 → 0
    // Outer glow
    ctx.lineCap = 'round';
    ctx.strokeStyle = `rgba(255,60,0,${t * 0.55})`;
    ctx.lineWidth   = 32;
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 28;
    ctx.beginPath();
    ctx.moveTo(boss.laserStartX, boss.laserStartY);
    ctx.lineTo(boss.laserEndX,   boss.laserEndY); ctx.stroke();
    // Core
    ctx.strokeStyle = `rgba(255,240,180,${t})`;
    ctx.lineWidth   = 7;
    ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(boss.laserStartX, boss.laserStartY);
    ctx.lineTo(boss.laserEndX,   boss.laserEndY); ctx.stroke();
  }
  ctx.restore();
}

function drawCrackedWall() {
  if (curRoom !== rooms[1][0] || wallBroken) return;
  ctx.save();
  // Glowing hint aura in crack zone
  const pulse = 0.4 + 0.2 * Math.sin(frame * 0.07);
  ctx.fillStyle = `rgba(160,100,255,${pulse * 0.35})`;
  ctx.fillRect(0, CY - 34, WALL, 68);

  // Crack lines
  ctx.lineCap = 'round';
  ctx.shadowColor = '#bb88ff';
  ctx.shadowBlur = 6 + 3 * Math.sin(frame * 0.07);
  ctx.strokeStyle = 'rgba(200,160,255,0.75)';
  ctx.lineWidth = 1.8;
  // Main jagged crack
  ctx.beginPath();
  ctx.moveTo(6,  CY - 16);
  ctx.lineTo(18, CY - 6);
  ctx.lineTo(11, CY + 1);
  ctx.lineTo(22, CY + 14);
  ctx.stroke();
  // Branch left
  ctx.beginPath();
  ctx.moveTo(18, CY - 6);
  ctx.lineTo(26, CY - 15);
  ctx.stroke();
  // Branch right
  ctx.beginPath();
  ctx.moveTo(11, CY + 1);
  ctx.lineTo(4,  CY + 9);
  ctx.stroke();

  // Dark inner gap
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(7,  CY - 15);
  ctx.lineTo(17, CY - 5);
  ctx.lineTo(12, CY + 2);
  ctx.lineTo(21, CY + 13);
  ctx.stroke();
  ctx.restore();
}

function drawHatItem() {
  if (curRoom !== secretRoom || hat.picked) return;
  const bob = Math.sin(frame * 0.07) * 3;
  ctx.save();
  ctx.translate(hat.x, hat.y + bob);
  ctx.shadowColor = '#cc88ff';
  ctx.shadowBlur = 16 + 6 * Math.sin(frame * 0.09);

  // Brim
  ctx.fillStyle = '#1e0a38';
  ctx.beginPath(); ctx.ellipse(0, 9, 19, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.ellipse(0, 9, 19, 5, 0, 0, Math.PI * 2); ctx.stroke();

  // Hat body (tapered)
  ctx.fillStyle = '#2a0a50';
  ctx.beginPath();
  ctx.moveTo(-13, 9);
  ctx.lineTo(-5, -20);
  ctx.lineTo(5, -20);
  ctx.lineTo(13, 9);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#6622aa'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-13, 9); ctx.lineTo(-5, -20); ctx.lineTo(5, -20); ctx.lineTo(13, 9);
  ctx.closePath(); ctx.stroke();

  // Band
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#d4a020';
  ctx.beginPath(); ctx.roundRect(-13, 4, 26, 5, 2); ctx.fill();

  // Star on brim
  ctx.shadowColor = '#ffee44'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffd700';
  ctx.font = '11px serif';
  ctx.textAlign = 'center';
  ctx.fillText('★', 0, 0);

  ctx.restore();
  ctx.textAlign = 'left';
}

function drawProjectiles() {
  for (const p of projectiles) {
    ctx.save();
    if (p.type === 'arrow') {
      // Draw as a rotated arrow shape
      const angle = Math.atan2(p.vy, p.vx);
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.shadowColor = '#ffe090'; ctx.shadowBlur = 6;
      // Shaft
      ctx.strokeStyle = '#c8a050'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(7, 0); ctx.stroke();
      // Head
      ctx.fillStyle = '#9090cc'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(7,0); ctx.lineTo(2,-3); ctx.lineTo(2,3); ctx.closePath(); ctx.fill();
      // Fletching
      ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-12,-4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(-12, 4); ctx.stroke();
    } else {
      const col = p.color || '#9b59b6';
      ctx.shadowColor = col; ctx.shadowBlur = 10;
      // Ink-blob body
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      // Shine
      ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(p.x - p.size*0.3, p.y - p.size*0.32, p.size*0.35, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawEnemy(e) {
  if (e.dead) return;
  if (e.type === 'beetle') { drawBeetle(e); return; }
  if (e.type === 'octo')   { drawOctopus(e); return; }
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.hitTimer > 0 && e.hitTimer % 3 < 2) ctx.globalAlpha = 0.35;

  const s = e.size / 2;
  const bob = Math.sin(frame * 0.11) * 2;

  // Glow
  ctx.shadowColor = '#ff2222';
  ctx.shadowBlur = 8;

  // Body
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.arc(0, bob, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#7b241c';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Horns
  ctx.fillStyle = '#922b21';
  ctx.beginPath();
  ctx.moveTo(-s*0.5, bob-s*0.7); ctx.lineTo(-s*0.8, bob-s*1.3); ctx.lineTo(-s*0.15, bob-s*0.8);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s*0.5, bob-s*0.7); ctx.lineTo(s*0.8, bob-s*1.3); ctx.lineTo(s*0.15, bob-s*0.8);
  ctx.fill();

  // Eyes
  const ew = s * 0.42, eh = s * 0.38;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-s*0.55, bob-s*0.3, ew, eh);
  ctx.fillRect(s*0.13, bob-s*0.3, ew, eh);
  ctx.fillStyle = '#111';
  const ex = e.dir * 2;
  ctx.fillRect(-s*0.4+ex, bob-s*0.2, ew*0.5, eh*0.6);
  ctx.fillRect(s*0.28+ex, bob-s*0.2, ew*0.5, eh*0.6);

  ctx.restore();
}

function drawPlayer() {
  // Flash during invincibility
  if (player.iframes > 0 && player.iframes % 6 < 3) return;

  ctx.save();
  ctx.translate(player.x, player.y);
  const s = player.size / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.9, s * 0.85, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (green tunic)
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.arc(0, 0, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#1a7a44';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Face/direction indicator
  let fx = 0, fy = 0;
  if (player.facing === 'up')    fy = -s * 0.58;
  if (player.facing === 'down')  fy =  s * 0.58;
  if (player.facing === 'left')  fx = -s * 0.58;
  if (player.facing === 'right') fx =  s * 0.58;

  // Face circle
  ctx.fillStyle = '#f0c080';
  ctx.beginPath();
  ctx.arc(fx, fy, 5, 0, Math.PI * 2);
  ctx.fill();

  // Hat tip (triangle pointing in facing direction)
  ctx.fillStyle = '#229954';
  ctx.beginPath();
  const hx = fx * 1.5, hy = fy * 1.5;
  const perp = player.facing === 'up' || player.facing === 'down' ? 4 : 0;
  const perpv = player.facing === 'left' || player.facing === 'right' ? 4 : 0;
  ctx.moveTo(hx, hy);
  ctx.lineTo(hx + perpv, hy + perp);
  ctx.lineTo(hx - perpv, hy - perp);
  ctx.closePath();
  ctx.fill();

  // Wizard hat (when collected) — sits on top of the player
  if (player.hasHat) {
    ctx.shadowColor = '#cc88ff'; ctx.shadowBlur = 7;
    // Brim
    ctx.fillStyle = '#1e0a38';
    ctx.beginPath(); ctx.ellipse(0, -s - 3, 10, 3, 0, 0, Math.PI * 2); ctx.fill();
    // Body
    ctx.fillStyle = '#2a0a50';
    ctx.beginPath();
    ctx.moveTo(-8, -s - 3);
    ctx.lineTo(-3, -s - 15);
    ctx.lineTo(3,  -s - 15);
    ctx.lineTo(8,  -s - 3);
    ctx.closePath(); ctx.fill();
    // Band
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#d4a020';
    ctx.fillRect(-8, -s - 8, 16, 3);
  }

  // Sword in hand (when held and not swinging)
  if (player.hasSword && player.attackTimer === 0) {
    // Offset to the right of facing direction
    const angles = { right: 0, down: Math.PI/2, left: Math.PI, up: -Math.PI/2 };
    const a = angles[player.facing] - Math.PI / 2.5; // slightly to the side
    const hsx = Math.cos(a) * (s + 4);
    const hsy = Math.sin(a) * (s + 4);
    ctx.shadowColor = '#88ccff';
    ctx.shadowBlur = 6;
    ctx.strokeStyle = '#c8e8ff';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(hsx, hsy);
    ctx.lineTo(hsx + Math.cos(angles[player.facing]) * 14,
               hsy + Math.sin(angles[player.facing]) * 14);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawHeart(cx, cy, r, filled) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + r * 0.9);
  ctx.bezierCurveTo(cx - r*2, cy + r*0.2, cx - r*2, cy - r*0.8, cx, cy - r*0.1);
  ctx.bezierCurveTo(cx + r*2, cy - r*0.8, cx + r*2, cy + r*0.2, cx, cy + r*0.9);
  ctx.closePath();
  ctx.fillStyle = filled ? '#e74c3c' : '#3a2222';
  ctx.fill();
  ctx.strokeStyle = filled ? '#922b21' : '#5a3232';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawHUD() {
  // Hearts
  for (let i = 0; i < player.maxHp; i++) {
    drawHeart(16 + i * 26, 18, 7, i < player.hp);
  }

  // Star counter (top right)
  ctx.font = 'bold 15px Courier New';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur = 6;
  ctx.textAlign = 'right';
  ctx.fillText(`★ ${starsGot} / ${TOTAL_STARS}`, W - 10, 24);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // Sword icon (when held)
  if (player.hasSword) {
    const ix = W / 2 - 30, iy = 10;
    ctx.save();
    ctx.translate(ix, iy + 10);
    ctx.shadowColor = '#88ccff';
    ctx.shadowBlur = player.attackTimer > 0 ? 18 : 6;
    ctx.strokeStyle = player.attackTimer > 0 ? '#ffffff' : '#c8e8ff';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-8, 8); ctx.lineTo(8, -8);
    ctx.stroke();
    // Guard
    ctx.strokeStyle = '#d4aa50';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-3, -3); ctx.lineTo(3, 3);
    ctx.stroke();
    ctx.fillStyle = '#d4aa50';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(-8, 8, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#aaddff';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('SPACE', W / 2, 28);
    ctx.textAlign = 'left';
  }

  // Bow icon (when held) — shown to the right of centre
  if (player.hasBow) {
    const ix = W / 2 + 22, iy = 10;
    ctx.save();
    ctx.translate(ix + 10, iy + 10);
    ctx.shadowColor = '#d4a020';
    ctx.shadowBlur = bowCooldown > 0 ? 4 : 10;
    // Arc stave
    ctx.strokeStyle = bowCooldown > 0 ? '#886010' : '#a06820';
    ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, 0, 8, -Math.PI*0.72, Math.PI*0.72); ctx.stroke();
    // String
    ctx.shadowBlur = 0; ctx.strokeStyle = '#e8ddb0'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(-Math.PI*0.72)*8, Math.sin(-Math.PI*0.72)*8);
    ctx.lineTo(Math.cos( Math.PI*0.72)*8, Math.sin( Math.PI*0.72)*8);
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#ffe090';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('E', ix + 10, 28);
    ctx.textAlign = 'left';
  }

  // Boss health bar (shown when in boss room and boss is alive)
  if (curRoom === bossRoom && boss && !boss.dead) {
    const barW = 300, barH = 13;
    const bx = (W - barW) / 2, by = H - 32;
    ctx.font = 'bold 11px Courier New';
    ctx.fillStyle = '#ff4422';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 8;
    ctx.fillText('✦ SHADOW WARLORD ✦', W/2, by - 5);
    ctx.shadowBlur = 0;
    // Background
    ctx.fillStyle = '#2a0505'; ctx.fillRect(bx, by, barW, barH);
    // HP fill
    const hf = boss.hp / boss.maxHp;
    ctx.fillStyle = hf > 0.5 ? '#cc1100' : hf > 0.25 ? '#ff3300' : '#ff8800';
    ctx.fillRect(bx, by, barW * hf, barH);
    // Border
    ctx.strokeStyle = '#660000'; ctx.lineWidth = 1.5;
    ctx.strokeRect(bx, by, barW, barH);
    ctx.textAlign = 'left';
  }
}

function drawMinimap() {
  const RW = 14, RH = 10, GAP = 3;
  const mapW = GRID_W * (RW + GAP) - GAP;
  const mapH = GRID_H * (RH + GAP) - GAP;
  const ox = W - mapW - 10;
  const oy = H - mapH - 10 - (RH + GAP) - 8;  // shift up to make room for boss room cell

  // Background panel
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(ox - 4, oy - 4, mapW + 8, mapH + 8);

  for (let gy = 0; gy < GRID_H; gy++) {
    for (let gx = 0; gx < GRID_W; gx++) {
      const r = rooms[gy][gx];
      const rx = ox + gx * (RW + GAP);
      const ry = oy + gy * (RH + GAP);

      if (r === curRoom) {
        ctx.fillStyle = '#00ff88';
      } else if (r === sword.room && !sword.picked) {
        ctx.fillStyle = '#44ddff';   // cyan   = sword
      } else if (r === bow.room && !bow.picked) {
        ctx.fillStyle = '#ffaa20';   // orange = bow
      } else if (r === potion.room && !potion.picked) {
        ctx.fillStyle = '#ff4488';   // pink   = potion
      } else if (r.visited) {
        const hasStars = r.stars.some(s => !s.collected);
        ctx.fillStyle = hasStars ? '#ccaa00' : '#556655';
      } else {
        ctx.fillStyle = '#1a2a1a';
      }
      ctx.fillRect(rx, ry, RW, RH);

      // Outline
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(rx, ry, RW, RH);
    }
  }

  // Secret room (left of rooms[1][0], shown once wall is broken)
  if (wallBroken) {
    const secRx = ox + 0 * (RW + GAP) - (RW + GAP);
    const secRy = oy + 1 * (RH + GAP);
    // Connector line
    ctx.strokeStyle = 'rgba(160,100,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ox, secRy + RH / 2);
    ctx.lineTo(secRx + RW, secRy + RH / 2);
    ctx.stroke();
    // Cell
    ctx.fillStyle = curRoom === secretRoom ? '#cc88ff' : (secretRoom.visited ? '#553388' : '#2a1144');
    ctx.fillRect(secRx, secRy, RW, RH);
    ctx.strokeStyle = '#9944cc'; ctx.lineWidth = 1;
    ctx.strokeRect(secRx, secRy, RW, RH);
    // Hat symbol
    ctx.fillStyle = '#ddaaff'; ctx.font = '7px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎩', secRx + RW / 2, secRy + RH - 1);
    ctx.textAlign = 'left';
  }

  // Boss room (below grid centre)
  if (bossUnlocked) {
    const bossRx = ox + 2 * (RW + GAP);
    const bossRy = oy + GRID_H * (RH + GAP);
    // Connecting line from room (2,2)
    ctx.strokeStyle = 'rgba(220,40,0,0.55)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bossRx + RW/2, oy + 2*(RH+GAP) + RH);
    ctx.lineTo(bossRx + RW/2, bossRy);
    ctx.stroke();
    // Room cell
    ctx.fillStyle = curRoom === bossRoom
      ? '#ff6600'
      : (boss && !boss.dead ? '#880000' : '#330000');
    ctx.fillRect(bossRx, bossRy, RW, RH);
    ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 1;
    ctx.strokeRect(bossRx, bossRy, RW, RH);
    // Skull icon
    ctx.fillStyle = '#ffaaaa'; ctx.font = '7px serif';
    ctx.textAlign = 'center';
    ctx.fillText('☠', bossRx + RW/2, bossRy + RH - 1);
    ctx.textAlign = 'left';
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.max;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawOverlay() {
  if (state === 'playing') return;

  ctx.fillStyle = 'rgba(0,0,0,0.74)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  if (state === 'won') {
    // Animated star sparkles
    for (let i = 0; i < 6; i++) {
      const a = (frame * 0.03 + i * Math.PI / 3);
      const sx = CX + Math.cos(a) * 140;
      const sy = H/2 - 20 + Math.sin(a) * 40;
      ctx.fillStyle = '#ffd700';
      ctx.font = '20px serif';
      ctx.fillText('★', sx - 10, sy);
    }
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 52px Courier New';
    ctx.fillText('YOU WIN!', CX, H/2 - 52);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff8855';
    ctx.font = 'bold 22px Courier New';
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 12;
    ctx.fillText('Shadow Warlord Defeated!', CX, H/2 - 10);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ccffcc';
    ctx.font = '18px Courier New';
    ctx.fillText(`All ${TOTAL_STARS} stars collected!`, CX, H/2 + 22);
    ctx.fillStyle = '#888';
    ctx.font = '15px Courier New';
    ctx.fillText('Press R to play again  ·  M to view achievements', CX, H/2 + 55);
  }

  if (state === 'dead') {
    ctx.shadowColor = '#c0392b';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 54px Courier New';
    ctx.fillText('GAME OVER', CX, H/2 - 40);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '22px Courier New';
    ctx.fillText(`Stars collected: ${starsGot} / ${TOTAL_STARS}`, CX, H/2 + 12);
    ctx.fillStyle = '#888';
    ctx.font = '15px Courier New';
    ctx.fillText('Press R to try again', CX, H/2 + 50);
  }

  ctx.textAlign = 'left';
}

// ─── Achievement popups ───────────────────────────────────────────────────────
function drawAchievPopups() {
  if (!achievPopups.length) return;
  const PW = 270, PH = 52, PR = 8;
  const px = W - PW - 10;

  for (let idx = 0; idx < Math.min(achievPopups.length, 3); idx++) {
    const pop = achievPopups[achievPopups.length - 1 - idx]; // newest first
    const t   = pop.timer;
    const alpha = t > 230 ? (260 - t) / 30   // fade in
                : t < 45  ? t / 45            // fade out
                : 1;
    const py = 10 + idx * 58;
    const meta = ACHIEVS.find(a => a.id === pop.id);
    if (!meta) continue;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Background panel
    ctx.fillStyle = 'rgba(10,10,20,0.88)';
    ctx.strokeStyle = '#d4a020';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(px, py, PW, PH, PR);
    ctx.fill(); ctx.stroke();

    // Gold left accent bar
    ctx.fillStyle = '#d4a020';
    ctx.beginPath();
    ctx.roundRect(px, py, 4, PH, [PR, 0, 0, PR]);
    ctx.fill();

    // Icon
    ctx.font = '22px serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(meta.icon, px + 14, py + 33);

    // Header
    ctx.font = 'bold 9px Courier New';
    ctx.fillStyle = '#d4a020';
    ctx.fillText('ACHIEVEMENT UNLOCKED', px + 44, py + 16);

    // Title
    ctx.font = 'bold 13px Courier New';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(meta.title, px + 44, py + 33);

    // Desc
    ctx.font = '10px Courier New';
    ctx.fillStyle = '#aaaaaa';
    ctx.fillText(meta.desc, px + 44, py + 46);

    ctx.restore();
  }
  ctx.textAlign = 'left';
}

// ─── Achievement menu overlay ────────────────────────────────────────────────
function drawAchievMenu() {
  if (!showAchievMenu) return;
  const MW = 380, MH = 410;
  const mx = (W - MW) / 2, my = (H - MH) / 2;

  ctx.save();
  // Dim background
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  ctx.fillStyle = '#0d1520';
  ctx.strokeStyle = '#d4a020';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(mx, my, MW, MH, 12); ctx.fill(); ctx.stroke();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 20px Courier New';
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
  ctx.fillText('✦ ACHIEVEMENTS ✦', W / 2, my + 34);
  ctx.shadowBlur = 0;

  // Divider
  ctx.strokeStyle = 'rgba(212,160,32,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(mx + 20, my + 46); ctx.lineTo(mx + MW - 20, my + 46); ctx.stroke();

  // Achievement rows
  const rowH = 54, startY = my + 66;
  for (let i = 0; i < ACHIEVS.length; i++) {
    const a      = ACHIEVS[i];
    const got    = !!achievements[a.id];
    const hidden = a.secret && !got;   // secret + not yet unlocked → mask it
    const ry     = startY + i * rowH;

    // Row highlight if unlocked
    if (got) {
      ctx.fillStyle = 'rgba(212,160,32,0.1)';
      ctx.beginPath(); ctx.roundRect(mx + 14, ry - 6, MW - 28, rowH - 4, 6); ctx.fill();
    }

    // Check / lock icon
    ctx.font = '18px serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = got ? '#44ee88' : '#444466';
    ctx.fillText(got ? '✓' : '○', mx + 22, ry + 22);

    // Achievement icon
    ctx.fillStyle = got ? '#ffffff' : '#555577';
    ctx.font = '20px serif';
    ctx.fillText(hidden ? '🔒' : a.icon, mx + 48, ry + 23);

    // Title
    ctx.font = `bold 13px Courier New`;
    ctx.fillStyle = got ? '#ffffff' : '#556677';
    ctx.fillText(hidden ? '???' : a.title, mx + 78, ry + 15);

    // Description
    ctx.font = '11px Courier New';
    ctx.fillStyle = got ? '#aaaacc' : '#445566';
    ctx.fillText(hidden ? '???' : a.desc, mx + 78, ry + 31);
  }

  // Footer
  ctx.textAlign = 'center';
  ctx.fillStyle = '#556677';
  ctx.font = '11px Courier New';
  ctx.fillText('Press M to close', W / 2, my + MH - 14);

  ctx.restore();
  ctx.textAlign = 'left';
}

// ─── Main draw ────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // During transition: crossfade between rooms
  const roomToDraw = (trans && trans.t >= 0.5) ? trans.nextRoom : curRoom;

  drawFloor();
  drawWalls(roomToDraw);

  for (const s of roomToDraw.stars) drawStar(s);

  if (!trans) {
    // Only draw live entities when not transitioning
    drawSwordItem();
    drawPotionItem();
    drawBowItem();
    drawHatItem();
    if (curRoom === bossRoom)
      for (const bp of bossRoomPotions) if (!bp.picked) drawPotionAt(bp.x, bp.y);
    for (const e of curRoom.enemies) drawEnemy(e);
    drawBossLaser();
    drawCrackedWall();
    drawProjectiles();
    drawParticles();
    drawAttack();
    drawPlayer();
    drawBoss();
  }

  drawHUD();
  drawMinimap();

  // Fade overlay for room transition
  if (trans) {
    const alpha = trans.t < 0.5 ? trans.t * 2 : (1 - trans.t) * 2;
    ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Boss-unlock announcement
  if (announceTimer > 0) {
    const t = announceTimer / 260;
    const alpha = t < 0.15 ? t / 0.15 : t > 0.85 ? (1-t) / 0.15 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, H/2 - 46, W, 76);
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#ff4422';
    ctx.font = 'bold 26px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('⚠  BOSS ROOM UNLOCKED  ⚠', CX, H/2 - 10);
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffaa55';
    ctx.font = '15px Courier New';
    ctx.fillText('Head south from the centre-bottom room', CX, H/2 + 18);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  drawOverlay();
  drawAchievPopups();
  drawAchievMenu();
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
