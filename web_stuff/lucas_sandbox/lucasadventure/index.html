// ─── Audio (Web Audio API, lazy-init on first gesture) ───────────────────────
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}

// Play a single synthesised tone
function tone(freq, type, dur, vol = 0.3, delay = 0) {
  const a = getAC(), t = a.currentTime + delay;
  const osc = a.createOscillator(), gain = a.createGain();
  osc.connect(gain); gain.connect(a.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.02);
}

// Frequency-sweep tone
function sweep(f0, f1, type, dur, vol = 0.3, delay = 0) {
  const a = getAC(), t = a.currentTime + delay;
  const osc = a.createOscillator(), gain = a.createGain();
  osc.connect(gain); gain.connect(a.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(f1, t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.02);
}

// ─── Background Music ─────────────────────────────────────────────────────────
const M_BPM  = 120;
const M_STEP = 60 / M_BPM / 2;   // 0.25 s per 8th-note

// 8-bar A-minor adventure loop (64 eighth-note steps)
//   null = rest / held note
const M_MEL = [
  // ── Part A ──────────────────────────────────────────────────────────────────
  330, 392, 440, 330,  294, 262, 294, 330,   // bar 1  – rises to A4, falls back
  220, 262, 330, 294,  262, 247, 220, null,   // bar 2  – descends to A3
  330, 392, 440, 330,  294, 330, 392, 440,    // bar 3  – climbing variation
  392, 330, 294, 262,  294, 330, 220, null,   // bar 4  – resolves to A3
  // ── Part B (new) ────────────────────────────────────────────────────────────
  440, 494, 523, 494,  440, 392, 440, 494,   // bar 5  – high run on C-major
  523, 494, 440, 392,  330, 294, 262, null,   // bar 6  – cascade down
  262, 294, 330, 392,  440, 392, 330, 294,   // bar 7  – ripple up and back
  330, 294, 262, 247,  220, 247, 262, null,   // bar 8  – descend to tonic rest
];

// Harmony counter-melody (sine, quieter) — thirds/sixths above melody
const M_HAR = [
  // ── Part A harmony ──────────────────────────────────────────────────────────
  392, 494, 523, 392,  370, 330, 370, 392,   // bar 1
  262, 330, 392, 370,  330, 294, 262, null,   // bar 2
  392, 494, 523, 392,  370, 392, 494, 523,   // bar 3
  494, 392, 370, 330,  370, 392, 262, null,   // bar 4
  // ── Part B harmony ──────────────────────────────────────────────────────────
  523, 587, 659, 587,  523, 494, 523, 587,   // bar 5
  659, 587, 523, 494,  392, 370, 330, null,   // bar 6
  330, 370, 392, 494,  523, 494, 392, 370,   // bar 7
  392, 370, 330, 294,  262, 294, 330, null,   // bar 8
];

const M_BASS = [
  // ── Part A ──────────────────────────────────────────────────────────────────
  110, null, 110, null,  110, null, 110, null,  // Am
  131, null, 131, null,   98, null,  98, null,  // C  → G
  110, null, 110, null,  147, null, 147, null,  // Am → D
  165, null, 165, null,  110, null, 110, null,  // E  → Am
  // ── Part B (new) ────────────────────────────────────────────────────────────
  131, null, 131, null,  131, null, 131, null,  // C
  117, null, 117, null,   98, null,  98, null,  // Bb → G
  110, null, 110, null,  165, null, 165, null,  // Am → E
  131, null, 131, null,  110, null, 110, null,  // C  → Am
];

let musicTimer = null, musicTime = 0, musicStep = 0, musicGain = null;
let bossMusicMode = false;

// ── Boss theme: 4-bar D-minor, 150 BPM ───────────────────────────────────────
const B_BPM  = 150;
const B_STEP = 60 / B_BPM / 2;   // 0.2 s per 8th-note

const B_MEL = [
  // Bar 1 – Ominous D-minor pulse
  294, null, 311, 294,   262, null, 233, null,
  // Bar 2 – Chromatic rise
  262, 294, 311, 349,    330, 311, 294, null,
  // Bar 3 – High menace descending
  392, null, 370, 349,   330, 294, 311, null,
  // Bar 4 – Crash and fall
  440, 392, 349, 311,    294, 262, 233, null,
];
const B_BASS = [
  73, null,  73, null,   73, null,  87, null,   // D2 pound → F2
  65, null,  65, null,   82, null,  73, null,   // C2 → E2 → D2
  73, null,  98, null,   87, null,  82, null,   // D2 → G2 → F2 → E2
  110,null,  98, null,   87, null,  73, null,   // A2 → G2 → F2 → D2
];

function _musicNote(freq, type, dur, vol, when) {
  if (!freq) return;
  const a = getAC(), osc = a.createOscillator(), g = a.createGain();
  osc.connect(g); g.connect(musicGain);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, when);
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vol, when + 0.01);
  g.gain.setValueAtTime(vol, when + dur * 0.75);
  g.gain.linearRampToValueAtTime(0, when + dur * 0.96);
  osc.start(when); osc.stop(when + dur + 0.01);
}

function _kick(when) {
  const a = getAC(), osc = a.createOscillator(), g = a.createGain();
  osc.connect(g); g.connect(musicGain);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(110, when);
  osc.frequency.exponentialRampToValueAtTime(40, when + 0.09);
  g.gain.setValueAtTime(0.28, when);
  g.gain.linearRampToValueAtTime(0, when + 0.09);
  osc.start(when); osc.stop(when + 0.1);
}

function _hat(when) {
  const a = getAC(), osc = a.createOscillator(), g = a.createGain();
  osc.connect(g); g.connect(musicGain);
  osc.type = 'square';
  osc.frequency.setValueAtTime(6000, when);
  g.gain.setValueAtTime(0.022, when);
  g.gain.linearRampToValueAtTime(0, when + 0.035);
  osc.start(when); osc.stop(when + 0.04);
}

function _snare(when) {
  // White-noise snare via AudioBuffer
  const a = getAC();
  const buf = a.createBuffer(1, Math.ceil(a.sampleRate * 0.12), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource(), g = a.createGain();
  src.buffer = buf;
  src.connect(g); g.connect(musicGain);
  g.gain.setValueAtTime(0.18, when);
  g.gain.linearRampToValueAtTime(0, when + 0.1);
  src.start(when); src.stop(when + 0.13);
}

function _musicTick() {
  const a = getAC();
  const step = bossMusicMode ? B_STEP : M_STEP;
  const mel  = bossMusicMode ? B_MEL  : M_MEL;
  const bass = bossMusicMode ? B_BASS : M_BASS;

  while (musicTime < a.currentTime + 0.15) {
    const i = musicStep % mel.length;
    if (bossMusicMode) {
      _musicNote(mel[i],  'sawtooth', step * 0.78, 0.09, musicTime);
      _musicNote(bass[i], 'triangle', step * 0.70, 0.16, musicTime);
      if (musicStep % 8 === 0 || musicStep % 8 === 4) _kick(musicTime);
      if (musicStep % 8 === 2 || musicStep % 8 === 6) _snare(musicTime);
      _hat(musicTime);
    } else {
      _musicNote(mel[i],   'square',   step * 0.82, 0.07, musicTime);
      _musicNote(M_HAR[i], 'sine',     step * 0.78, 0.04, musicTime);
      _musicNote(bass[i],  'triangle', step * 0.72, 0.12, musicTime);
      if (musicStep % 8 === 0 || musicStep % 8 === 4) _kick(musicTime);
      _hat(musicTime);
    }
    musicTime += step;
    musicStep++;
  }
}

function switchMusic(toBoss) {
  clearInterval(musicTimer); musicTimer = null;
  bossMusicMode = toBoss;
  musicStep = 0;
  if (!_ac || !musicGain) return;
  const a = getAC();
  // Fade out then fade in new theme
  musicGain.gain.cancelScheduledValues(a.currentTime);
  musicGain.gain.setValueAtTime(musicGain.gain.value, a.currentTime);
  musicGain.gain.linearRampToValueAtTime(0,   a.currentTime + 0.4);
  musicGain.gain.linearRampToValueAtTime(0.5, a.currentTime + 1.1);
  musicTime  = a.currentTime + 0.55;   // start after fade-out gap
  musicTimer = setInterval(_musicTick, 50);
}

function startMusic() {
  if (musicTimer) return;
  const a = getAC();
  if (!musicGain) {
    musicGain = a.createGain();
    musicGain.connect(a.destination);
  }
  // Fade in
  musicGain.gain.cancelScheduledValues(a.currentTime);
  musicGain.gain.setValueAtTime(0, a.currentTime);
  musicGain.gain.linearRampToValueAtTime(0.5, a.currentTime + 1.0);
  musicTime = a.currentTime + 0.05;
  musicTimer = setInterval(_musicTick, 50);
}

function stopMusic(fadeSecs = 0) {
  clearInterval(musicTimer);
  musicTimer = null;
  if (fadeSecs > 0 && musicGain) {
    const a = getAC();
    musicGain.gain.cancelScheduledValues(a.currentTime);
    musicGain.gain.setValueAtTime(musicGain.gain.value, a.currentTime);
    musicGain.gain.linearRampToValueAtTime(0, a.currentTime + fadeSecs);
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let attackPressed = false;
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ') attackPressed = true;
  if (e.key === 'e' || e.key === 'E') { shootPressed = true; e.preventDefault(); }
  if (e.key === 'm' || e.key === 'M') showAchievMenu = !showAchievMenu;
  if ((e.key === 'r' || e.key === 'R') && state !== 'playing') reset();
  startMusic(); // no-op after first call; satisfies browser autoplay policy
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Room templates ──────────────────────────────────────────────────────────
// stars: [{x,y}]  enemies: [{x,y,axis:'x'|'y',min,max,spd}]
// 15 rooms (5 cols × 3 rows), 12 total stars
const TEMPLATES = [
  // ── Row 0 ───────────────────────────────────────────────────────────────
  { stars: [{x:160,y:200}],

  { stars: [],

    enemies: [{x:200,y:150,axis:'y',min:60,max:400,spd:1.6},

    enemies: [{type:'octo',x:320,y:240,shootInterval:100},

  // ── Row 2 ───────────────────────────────────────────────────────────────

    enemies: [{x:320,y:200,axis:'x',min:80,max:560,spd:1.4},

  { stars: [{x:350,y:240}],
    enemies: [{x:180,y:180,axis:'x',min:80,max:560,spd:1.7},
              {x:480,y:310,axis:'y',min:60,max:400,spd:2.0},
              {type:'octo',x:320,y:370,shootInterval:110}] },                                // (2,2)
  { stars: [{x:200,y:200},{x:490,y:320}],
    enemies: [{x:330,y:240,axis:'x',min:80,max:560,spd:1.6},

// Star count check: 1+1+0+1+1 + 0+0+2+1+0 + 1+0+1+2+1 = 12 ✓

// ─── Build rooms ─────────────────────────────────────────────────────────────
function buildRooms() {
  const grid = [];
  for (let gy = 0; gy < GRID_H; gy++) {
    grid[gy] = [];
    for (let gx = 0; gx < GRID_W; gx++) {
      const t = TEMPLATES[gy * GRID_W + gx];
      grid[gy][gx] = {
        gx, gy,
        doors: { N: gy > 0, S: gy < GRID_H-1, W: gx > 0, E: gx < GRID_W-1 },
        stars:   t.stars.map(s => ({ x: s.x, y: s.y, collected: false })),
        enemies: t.enemies.map(e => ({
          ...e,
          type: e.type || 'patrol',
          dir: 1,
          size: e.type === 'octo' ? 24 : e.type === 'beetle' ? 20 : 16,
          hitTimer: 0,
          dead: false,
          ...(e.type === 'octo' ? { shootTimer: 40 + Math.floor(Math.random() * 70) } : {}),
        })),
        visited: false,
      };
    }
  }
  return grid;
}

// ─── Game state ──────────────────────────────────────────────────────────────
let rooms, curRoom, player, starsGot, state, trans, particles, projectiles, frame;
let bossRoom, boss, bossUnlocked, announceTimer, bossRoomPotions;
let bow, bowCooldown, shootPressed;
let achievements, achievPopups, showAchievMenu;
let secretRoom, wallBroken, hat;

function makePlayer() {
  return { x: CX, y: CY, size: 20, spd: 3, hp: 3, maxHp: 3,
           facing: 'down', iframes: 0, hasSword: false, hasBow: false, hasHat: false, attackTimer: 0 };
}

// sword item: placed in room (gx=0, gy=1) – the left-middle room
let sword;  // { room, x, y, picked }
let potion; // { room, x, y, picked }

function reset() {
  rooms     = buildRooms();
  curRoom   = rooms[1][1];
  curRoom.visited = true;
  player    = makePlayer();
  starsGot  = 0;
  state     = 'playing';
  trans     = null;     // { nextRoom, playerTo:{x,y}, t }
  particles = [];
  frame     = 0;
  attackPressed = false;
  projectiles = [];
  bossMusicMode    = false;
  achievements     = {};
  achievPopups     = [];
  showAchievMenu   = false;
  stopMusic();
  if (_ac) startMusic();
  // Pick a random room (not the start room) for the sword
  const swordCandidates = [];
  for (let gy = 0; gy < GRID_H; gy++)
    for (let gx = 0; gx < GRID_W; gx++)
      if (!(gx === 1 && gy === 1)) swordCandidates.push(rooms[gy][gx]);
  const swordRoom = swordCandidates[Math.floor(Math.random() * swordCandidates.length)];
  sword = {
    room: swordRoom,
    x: WALL + 60 + Math.floor(Math.random() * (W - (WALL + 60) * 2)),
    y: WALL + 60 + Math.floor(Math.random() * (H - (WALL + 60) * 2)),
    picked: false,
  };

  // Pick a random room for the potion (not start, not sword room)
  const potionCandidates = swordCandidates.filter(r => r !== swordRoom);
  const potionRoom = potionCandidates[Math.floor(Math.random() * potionCandidates.length)];
  potion = {
    room: potionRoom,
    x: WALL + 60 + Math.floor(Math.random() * (W - (WALL + 60) * 2)),
    y: WALL + 60 + Math.floor(Math.random() * (H - (WALL + 60) * 2)),
    picked: false,
  };

  // Pick a random room for the bow (not start, not sword, not potion)
  const bowCandidates = potionCandidates.filter(r => r !== potionRoom);
  const bowRoom = bowCandidates[Math.floor(Math.random() * bowCandidates.length)];
  bow = {
    room: bowRoom,
    x: WALL + 60 + Math.floor(Math.random() * (W - (WALL + 60) * 2)),
    y: WALL + 60 + Math.floor(Math.random() * (H - (WALL + 60) * 2)),
    picked: false,
  };
  bowCooldown  = 0;
  shootPressed = false;

  // ── Boss room (unlocks south of room [2][2] when all stars collected) ──
  bossUnlocked  = false;
  announceTimer = 0;
  bossRoom = {
    gx: 2, gy: 3,
    doors: { N: false, S: false, W: false, E: false },
    stars: [], enemies: [],
    visited: false, isBossRoom: true,
  };
  boss = {
    x: CX, y: CY - 40,
    size: 72, hp: 15, maxHp: 15,
    hitTimer: 0, dead: false,
    vx: 1.3, vy: 0.9,
    spawnTimer: 220,
    burstTimer: 190,
    laserState: 'idle',   // 'idle' | 'charging' | 'firing'
    laserTimer: 380,
    laserChargeTimer: 0,
    laserFireTimer: 0,
    laserAngle: 0,
    laserStartX: 0, laserStartY: 0,
    laserEndX: 0,   laserEndY: 0,
    potionSpawnTimer: 420,
  };
  bossRoomPotions = [];

  // ── Secret room (west of room [0][1], opened by shooting cracked wall) ──
  wallBroken = false;
  secretRoom = {
    gx: -1, gy: 1,
    doors: { N: false, S: false, W: false, E: false },
    stars: [], enemies: [],
    visited: false, isSecretRoom: true,
  };
  hat = { x: CX, y: CY, picked: false };
}
