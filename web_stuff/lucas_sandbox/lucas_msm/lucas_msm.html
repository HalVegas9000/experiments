<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Humming Monsters</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1628;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: linear-gradient(135deg, #1a3a1a, #0d2b0d);
    border-bottom: 3px solid #2d6a2d;
    z-index: 10;
    flex-shrink: 0;
  }
  #header h1 {
    color: #7fff7f;
    font-size: 1.5rem;
    text-shadow: 0 0 12px #3f3;
    letter-spacing: 1px;
  }
  #coin-display {
    background: #1a2a00;
    border: 2px solid #8BC34A;
    border-radius: 20px;
    padding: 4px 14px;
    color: #FFD700;
    font-size: 1.1rem;
    font-weight: bold;
    min-width: 110px;
    text-align: right;
  }
  #tempo-display {
    color: #7fc; font-size: 0.85rem; opacity: 0.7;
  }

  /* ── ISLAND ── */
  #island-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #island-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 60%, #1a4d2e 0%, #0e3320 50%, #071a0e 100%);
  }
  /* water shimmer */
  #island-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 80% at 50% 55%, transparent 58%, rgba(0,60,120,0.55) 100%);
    pointer-events: none;
  }
  /* stars */
  #stars {
    position: absolute; inset: 0; pointer-events: none;
  }

  #island {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -48%);
    width: 720px;
    height: 380px;
    background: radial-gradient(ellipse 100% 90% at 50% 60%, #2d6a2d, #1e4d1e 70%, transparent 100%);
    border-radius: 50%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    align-items: center;
    justify-items: center;
    padding: 30px 60px 50px;
    gap: 10px;
  }

  /* ── MONSTER SLOTS ── */
  .monster-slot {
    width: 120px;
    height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    position: relative;
    cursor: default;
  }
  .monster-slot.empty {
    cursor: pointer;
    opacity: 0.4;
    filter: grayscale(1);
    transition: opacity 0.2s, filter 0.2s;
  }
  .monster-slot.empty:hover { opacity: 0.7; filter: grayscale(0.5); }

  .monster-body {
    position: relative;
    transition: transform 0.08s ease;
  }
  .monster-body.beat {
    transform: translateY(-8px) scale(1.08);
  }
  .monster-label {
    color: #aed; font-size: 0.65rem; text-align: center; margin-top: 3px;
    text-shadow: 0 1px 3px #000;
    white-space: nowrap;
  }

  /* glow ring when playing */
  .monster-body::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    box-shadow: 0 0 0px transparent;
    transition: box-shadow 0.1s;
    pointer-events: none;
  }
  .monster-body.glow::after {
    box-shadow: 0 0 18px 6px var(--glow-color, #7fff7f);
  }

  /* note particles */
  .note-particle {
    position: absolute;
    font-size: 1.1rem;
    pointer-events: none;
    animation: floatNote 1.2s ease-out forwards;
    z-index: 20;
  }
  @keyframes floatNote {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-55px) scale(0.5); }
  }

  /* ── SHOP ── */
  #shop {
    flex-shrink: 0;
    background: linear-gradient(180deg, #0d1f0d, #0a1628);
    border-top: 3px solid #2d6a2d;
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    align-items: center;
    height: 130px;
  }
  #shop::-webkit-scrollbar { height: 4px; }
  #shop::-webkit-scrollbar-thumb { background: #2d6a2d; border-radius: 2px; }

  .shop-card {
    flex-shrink: 0;
    width: 100px;
    background: #0f2d0f;
    border: 2px solid #3a7d3a;
    border-radius: 10px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    position: relative;
  }
  .shop-card:hover:not(.locked) { border-color: #7fff7f; transform: translateY(-2px); }
  .shop-card.owned { border-color: #555; opacity: 0.5; cursor: default; }
  .shop-card.locked { opacity: 0.35; cursor: not-allowed; }
  .shop-card .card-name { color: #aed; font-size: 0.65rem; font-weight: bold; text-align: center; }
  .shop-card .card-cost { color: #FFD700; font-size: 0.75rem; }
  .shop-card .card-rate { color: #8BC34A; font-size: 0.6rem; }
  .shop-card .card-tag {
    position: absolute; top: -8px; right: -6px;
    background: #1a5c1a; border: 1px solid #5f5; border-radius: 8px;
    color: #7fff7f; font-size: 0.55rem; padding: 1px 5px;
  }
  .shop-card .card-preview { width: 52px; height: 52px; }

  /* ── START BUTTON ── */
  #start-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  #start-overlay h2 { color: #7fff7f; font-size: 2rem; text-shadow: 0 0 20px #3f3; }
  #start-overlay p { color: #aed; font-size: 0.9rem; max-width: 380px; text-align: center; }
  #start-btn {
    background: linear-gradient(135deg, #2d8a2d, #1a5c1a);
    border: 2px solid #7fff7f;
    color: #7fff7f;
    font-size: 1.2rem;
    padding: 12px 40px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(127,255,127,0.3);
  }
  #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(127,255,127,0.5); }

  /* ── MUTE BTN ── */
  #mute-btn {
    background: none; border: 1px solid #555; color: #aaa;
    padding: 4px 10px; border-radius: 12px; cursor: pointer; font-size: 0.8rem;
  }
  #mute-btn:hover { border-color: #aaa; color: #fff; }

  /* scrolling water text */
  #waterline {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    color: rgba(100,200,255,0.25); font-size: 0.7rem;
    pointer-events: none; white-space: nowrap;
    animation: waveText 6s ease-in-out infinite;
  }
  @keyframes waveText {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(3px); }
  }

  /* toast */
  #toast {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: #1a5c1a; border: 2px solid #5f5; border-radius: 20px;
    color: #7fff7f; padding: 6px 20px; font-size: 0.9rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="start-overlay">
  <h2>🎵 My Humming Monsters</h2>
  <p>Each monster sings its own part. Unlock them all to build the full song!</p>
  <p style="color:#8BC34A;font-size:0.75rem">Earn 🪙 coins over time — spend them in the shop below.</p>
  <button id="start-btn">▶ Start Island</button>
</div>

<div id="header">

</div>

<div id="island-wrap">

  <div id="island">
    <!-- 8 monster slots filled by JS -->

  <div id="waterline">〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜</div>
</div>

<div id="shop">
  <!-- shop cards filled by JS -->
</div>

<div id="toast"></div>

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let muted = false;

let coins = 30;
let coinAccum = 0;
let lastCoinTime = performance.now();

const unlockedIds = new Set(['noggin']); // noggin is free starter
const scheduledNotes = new Map(); // id -> next schedule time

// Scheduler state
let loopStartTime = 0;   // audioCtx time when loop step 0 started
let schedulerTimer = null;
const LOOKAHEAD = 0.12;  // seconds ahead to schedule
const SCHEDULE_INTERVAL = 50; // ms

// Which slots have which monster
const slotMonsters = new Array(8).fill(null);

// Beat tracking for animation
let currentAnimStep = 0;
let animTimer = null;

// ═══════════════════════════════════════════════════════════
//  AUDIO SYNTHESIS
// ═══════════════════════════════════════════════════════════
function playDrum(type, time) {
  if (muted) return;
  const st = stepTime();
  if (type === 'kick') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(masterGain);
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
    gain.gain.setValueAtTime(0.9, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
    osc.start(time); osc.stop(time + 0.25);
  } else if (type === 'snare') {
    // noise burst
    const bufLen = audioCtx.sampleRate * 0.18;
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 1000;
    const gain = audioCtx.createGain();
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.5, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    src.start(time); src.stop(time + 0.2);
    // tonal body
    const osc = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc.connect(g2); g2.connect(masterGain);
    osc.frequency.setValueAtTime(200, time);
    g2.gain.setValueAtTime(0.25, time);
    g2.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    osc.start(time); osc.stop(time + 0.14);
  } else if (type === 'hat') {
    const bufLen = audioCtx.sampleRate * 0.05;
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 7000;
    const gain = audioCtx.createGain();
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.18, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    src.start(time); src.stop(time + 0.07);
  }
}

function playTone(instrument, freq, dur, vel, time) {
  if (muted) return;
  const st = stepTime();
  const durSec = dur * st * 0.9;

  if (instrument === 'hum') {
    // Mammoth hum: pure sine with vibrato
    const osc = audioCtx.createOscillator();
    const vib = audioCtx.createOscillator();
    const vibGain = audioCtx.createGain();
    const gain = audioCtx.createGain();
    vib.frequency.value = 5.5;
    vibGain.gain.value = 2.5;
    vib.connect(vibGain); vibGain.connect(osc.frequency);
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.9, time + 0.08);
    gain.gain.setValueAtTime(vel * 0.9, time + durSec - 0.12);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.05);
    vib.start(time); vib.stop(time + durSec + 0.05);

  } else if (instrument === 'pluck') {
    // Karplus-Strong-ish pluck: filtered noise decay
    const bufLen = Math.ceil(audioCtx.sampleRate / freq);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = freq * 6;
    const gain = audioCtx.createGain();
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(vel * 0.75, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + durSec * 1.5 + 0.1);
    src.start(time); src.stop(time + durSec * 1.5 + 0.15);

  } else if (instrument === 'sine') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.5, time + 0.02);
    gain.gain.setValueAtTime(vel * 0.5, time + durSec - 0.05);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.02);

  } else if (instrument === 'triangle') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.55, time + 0.025);
    gain.gain.setValueAtTime(vel * 0.55, time + durSec - 0.06);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.03);

  } else if (instrument === 'chord') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.4, time + 0.01);
    gain.gain.exponentialRampToValueAtTime(vel * 0.2, time + durSec * 0.6);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.02);

  } else if (instrument === 'flute') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    // add a sub-osc for warmth
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'triangle'; osc2.frequency.value = freq * 2;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.15;
    osc2.connect(g2); g2.connect(masterGain);
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.45, time + 0.035);
    gain.gain.setValueAtTime(vel * 0.45, time + durSec - 0.07);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.02);
    osc2.start(time); osc2.stop(time + durSec + 0.02);

  } else if (instrument === 'cello') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = freq * 5;
    // vibrato
    const vib = audioCtx.createOscillator();
    const vibG = audioCtx.createGain();
    vib.frequency.value = 4; vibG.gain.value = 3;
    vib.connect(vibG); vibG.connect(osc.frequency);
    osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vel * 0.5, time + 0.15);
    gain.gain.setValueAtTime(vel * 0.5, time + durSec - 0.2);
    gain.gain.linearRampToValueAtTime(0, time + durSec);
    osc.start(time); osc.stop(time + durSec + 0.05);
    vib.start(time); vib.stop(time + durSec + 0.05);
  }
}

// ═══════════════════════════════════════════════════════════
//  SCHEDULER
// ═══════════════════════════════════════════════════════════
function scheduleLoop() {
  const now = audioCtx.currentTime;
  const st = stepTime();
  const loopDur = STEPS * st;

  // how many loop iterations have elapsed?
  const elapsed = now - loopStartTime;
  const loopNum = Math.floor(elapsed / loopDur);
  // start of current loop iteration
  const thisLoopStart = loopStartTime + loopNum * loopDur;
  // start of next loop iteration
  const nextLoopStart = thisLoopStart + loopDur;

  // schedule all notes in current + next loop within lookahead window
  [thisLoopStart, nextLoopStart].forEach(ls => {
    slotMonsters.forEach(monsterId => {
      if (!monsterId) return;
      const monster = MONSTERS.find(m => m.id === monsterId);
      if (!monster) return;

      monster.sequence.forEach(note => {
        const noteTime = ls + note.step * st;
        if (noteTime >= now && noteTime < now + LOOKAHEAD) {
          if (monster.instrument === 'drum') {
            playDrum(note.type, noteTime);
          } else {
            playTone(monster.instrument, note.freq, note.dur, note.vel, noteTime);
          }
        }
      });
    });
  });
}

function startScheduler() {
  if (schedulerTimer) return;
  loopStartTime = audioCtx.currentTime + 0.1;
  schedulerTimer = setInterval(scheduleLoop, SCHEDULE_INTERVAL);
  startAnimLoop();
}

function stopScheduler() {
  if (schedulerTimer) { clearInterval(schedulerTimer); schedulerTimer = null; }
  if (animTimer) { clearInterval(animTimer); animTimer = null; }
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION (beat sync)
// ═══════════════════════════════════════════════════════════
function startAnimLoop() {
  if (animTimer) return;
  const st = stepTime() * 1000; // ms
  const startMs = performance.now();
  const loopMs = STEPS * st;
  let lastStep = -1;

  animTimer = setInterval(() => {
    const now = audioCtx.currentTime;
    const elapsed = now - loopStartTime;
    const loopPos = ((elapsed % (STEPS * stepTime())) + STEPS * stepTime()) % (STEPS * stepTime());
    const step = Math.floor(loopPos / stepTime()) % STEPS;

    if (step === lastStep) return;
    lastStep = step;
    currentAnimStep = step;

    // find which monsters should animate this step
    slotMonsters.forEach((mId, slotIdx) => {
      if (!mId) return;
      const monster = MONSTERS.find(m => m.id === mId);
      if (!monster) return;
      const fires = monster.sequence.some(n => n.step === step);
      if (fires) {
        animateMonsterId(mId, slotIdx);
        spawnNote(slotIdx);
      }
    });
  }, Math.max(20, st / 2));
}

function animateMonsterId(mId, slotIdx) {
  const el = document.querySelector(`[data-slot="${slotIdx}"] .monster-body`);
  if (!el) return;
  const monster = MONSTERS.find(m => m.id === mId);
  el.style.setProperty('--glow-color', monster ? monster.glowColor : '#7fff7f');
  el.classList.add('beat', 'glow');
  setTimeout(() => el.classList.remove('beat', 'glow'), 140);
}

const NOTES_EMOJI = ['♩','♪','♫','♬','🎵','🎶'];
function spawnNote(slotIdx) {
  const slot = document.querySelector(`[data-slot="${slotIdx}"]`);
  if (!slot) return;
  const note = document.createElement('div');
  note.className = 'note-particle';
  note.textContent = NOTES_EMOJI[Math.floor(Math.random() * NOTES_EMOJI.length)];
  note.style.left = (30 + Math.random() * 50) + 'px';
  note.style.top = '10px';
  note.style.color = `hsl(${Math.random()*360},100%,75%)`;
  slot.appendChild(note);
  setTimeout(() => note.remove(), 1300);
}

// ═══════════════════════════════════════════════════════════
//  COIN SYSTEM
// ═══════════════════════════════════════════════════════════
function tickCoins() {
  const now = performance.now();
  const dt = (now - lastCoinTime) / 1000;
  lastCoinTime = now;

  let rate = 0;
  slotMonsters.forEach(mId => {
    if (!mId) return;
    const m = MONSTERS.find(x => x.id === mId);
    if (m) rate += m.coinRate;
  });
  coinAccum += rate * dt;

  if (coinAccum >= 1) {
    coins += Math.floor(coinAccum);
    coinAccum -= Math.floor(coinAccum);
    updateCoinDisplay();
  }
}

function updateCoinDisplay() {
  document.getElementById('coin-count').textContent = Math.floor(coins);
  // update shop card affordability
  document.querySelectorAll('.shop-card').forEach(card => {
    const id = card.dataset.id;
    if (unlockedIds.has(id)) return;
    const m = MONSTERS.find(x => x.id === id);
    if (!m) return;
    if (coins >= m.cost) card.classList.remove('locked');
    else card.classList.add('locked');
  });
}

// ═══════════════════════════════════════════════════════════
//  UI BUILDING
// ═══════════════════════════════════════════════════════════
function buildIsland() {
  const island = document.getElementById('island');
  island.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const mId = slotMonsters[i];
    const slot = document.createElement('div');
    slot.className = 'monster-slot' + (mId ? '' : ' empty');
    slot.dataset.slot = i;

    if (mId) {
      const monster = MONSTERS.find(m => m.id === mId);
      slot.innerHTML = `
        <div class="monster-body" style="width:80px;height:80px">
          ${monster.svg()}
        </div>
        <div class="monster-label">${monster.name}</div>`;
    } else {
      slot.innerHTML = `
        <div class="monster-body" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#aaa">+</div>
        <div class="monster-label">Empty</div>`;
      slot.addEventListener('click', () => showShopHint());
    }
    island.appendChild(slot);
  }
}

function buildShop() {
  const shop = document.getElementById('shop');
  shop.innerHTML = '<div style="color:#7fc;font-size:0.7rem;writing-mode:vertical-lr;padding:0 4px;opacity:0.7">SHOP</div>';

  MONSTERS.forEach(m => {
    const owned = slotMonsters.includes(m.id);
    const locked = !unlockedIds.has(m.id) && coins < m.cost;
    const card = document.createElement('div');
    card.className = 'shop-card' + (owned ? ' owned' : (locked ? ' locked' : ''));
    card.dataset.id = m.id;

    card.innerHTML = `
      ${owned ? '<div class="card-tag">On Island</div>' : ''}
      <div class="card-preview">${m.svg()}</div>
      <div class="card-name">${m.name}</div>
      ${owned ? '<div class="card-cost" style="color:#888">Placed</div>' :
                `<div class="card-cost">🪙 ${m.cost === 0 ? 'Free' : m.cost}</div>`}
      <div class="card-rate">+${m.coinRate}/s</div>`;

    if (!owned) {
      card.addEventListener('click', () => tryBuyMonster(m.id));
    }
    shop.appendChild(card);
  });
}

function tryBuyMonster(id) {
  const m = MONSTERS.find(x => x.id === id);
  if (!m) return;
  if (slotMonsters.includes(id)) { showToast(`${m.name} is already on your island!`); return; }
  if (coins < m.cost) { showToast(`Need 🪙 ${m.cost} coins — keep earning!`); return; }

  // Find first empty slot
  const emptySlot = slotMonsters.indexOf(null);
  if (emptySlot === -1) { showToast('Island is full!'); return; }

  coins -= m.cost;
  unlockedIds.add(id);
  slotMonsters[emptySlot] = id;

  updateCoinDisplay();
  buildIsland();
  buildShop();
  showToast(`🎵 ${m.name} joins your island!`);
}

function showShopHint() {
  showToast('Buy a monster from the shop below!');
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════════
//  STARS BACKGROUND
// ═══════════════════════════════════════════════════════════
function drawStars() {
  const canvas = document.getElementById('stars');
  canvas.width = window.innerWidth;
  canvas.height = document.getElementById('island-wrap').offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.7;
    const r = Math.random() * 1.5 + 0.3;
    const a = Math.random() * 0.8 + 0.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.72;
  // slight reverb via convolver would be nice but keep it simple
  masterGain.connect(audioCtx.destination);
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').style.display = 'none';
  initAudio();

  // Place starter noggin in slot 0
  slotMonsters[0] = 'noggin';

  buildIsland();
  buildShop();
  drawStars();

  startScheduler();
  setInterval(tickCoins, 100);
});

document.getElementById('mute-btn').addEventListener('click', () => {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.72;
  document.getElementById('mute-btn').textContent = muted ? '🔇 Unmute' : '🔊 Mute';
});

window.addEventListener('resize', drawStars);

// Twinkle stars occasionally
setInterval(() => {
  if (document.getElementById('start-overlay').style.display !== 'none') return;
  drawStars();
}, 8000);
</script>
</body>
