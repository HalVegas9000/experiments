<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Clicker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* LEFT PANEL */
  #left {
    width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #16213e;
    border-right: 2px solid #0f3460;
    gap: 16px;
  }

  #cookie-count {
    font-size: 1.6rem;
    font-weight: bold;
    color: #e8a020;
    text-align: center;
  }
  #cps {
    font-size: 0.85rem;
    color: #aaa;
  }

  #cookie-btn {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 35% 35%, #c8854a, #7a4a1e);
    cursor: pointer;
    font-size: 6.5rem;
    line-height: 240px;
    text-align: center;
    box-shadow: 0 0 30px #c8854a66;
    transition: transform 0.07s, box-shadow 0.07s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  #cookie-btn:active {
    transform: scale(0.93);
    box-shadow: 0 0 10px #c8854a44;
  }

  #multiplier-info {
    font-size: 0.8rem;
    color: #ccc;
    text-align: center;
    line-height: 1.6;
  }

  /* RIGHT PANEL */
  #right {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  h2 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #888;
    padding: 14px 20px 8px;
    border-bottom: 1px solid #0f3460;
  }

  #upgrades, #buildings {
    overflow-y: auto;
    padding: 10px 16px;
  }
  #upgrades { max-height: 38%; border-bottom: 2px solid #0f3460; }
  #buildings { flex: 1; }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
    margin: 6px 0 8px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0f3460;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    border: 1px solid transparent;
  }
  .item:hover:not(.locked) { background: #164080; border-color: #e8a020; }
  .item.locked { opacity: 0.4; cursor: not-allowed; }

  .item-icon { font-size: 1.8rem; flex-shrink: 0; }
  .item-info { flex: 1; }
  .item-name { font-weight: bold; font-size: 0.95rem; }
  .item-desc { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
  .item-cost {
    font-size: 0.85rem;
    font-weight: bold;
    color: #e8a020;
    white-space: nowrap;
  }
  .item-owned {
    font-size: 0.75rem;
    color: #888;
    text-align: right;
  }

  /* Floating +1 pop */
  .pop {
    position: fixed;
    font-size: 1.1rem;
    font-weight: bold;
    color: #e8a020;
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.7); }
  }

  /* Achievement toast */
  #toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #1e1e1e;
    border: 1px solid #e8a020;
    border-radius: 10px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    z-index: 2000;
    transition: transform 0.35s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px #0008;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast-icon { font-size: 1.4rem; }
  #toast-text { color: #eee; }
  #toast-text strong { color: #e8a020; display: block; }

  /* Achievements button */
  #ach-btn {
    background: #0f3460;
    border: 1px solid #1a4a80;
    color: #ccc;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    width: 100%;
    text-align: center;
  }
  #ach-btn:hover { background: #164080; color: #fff; }

  /* Achievements modal */
  #ach-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000a;
    z-index: 1500;
    align-items: center;
    justify-content: center;
  }
  #ach-overlay.open { display: flex; }
  #ach-modal {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 12px;
    width: 480px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 40px #000c;
  }
  #ach-modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid #0f3460;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 1rem;
  }
  #ach-close {
    background: none;
    border: none;
    color: #888;
    font-size: 1.2rem;
    cursor: pointer;
  }
  #ach-close:hover { color: #fff; }
  #ach-list {
    overflow-y: auto;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ach-card {
    background: #0f3460;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: center;
    border: 1px solid transparent;
  }
  .ach-card.earned { border-color: #e8a020; }
  .ach-card.locked { opacity: 0.35; filter: grayscale(1); }
  .ach-card-icon { font-size: 1.6rem; }
  .ach-card-name { font-size: 0.8rem; font-weight: bold; }
  .ach-card-desc { font-size: 0.7rem; color: #aaa; margin-top: 2px; }

  /* Dev mode */
  #dev-btn {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: #222;
    color: #555;
    border: 1px solid #333;
    border-radius: 4px;
    font-size: 0.65rem;
    padding: 4px 8px;
    cursor: pointer;
    z-index: 1000;
  }
  #dev-btn:hover { color: #aaa; border-color: #555; }
  #dev-panel {
    display: none;
    position: fixed;
    bottom: 38px;
    right: 10px;
    background: #111;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px;
    z-index: 1000;
    display: none;
    flex-direction: column;
    gap: 6px;
    min-width: 160px;
  }
  #dev-panel button {
    background: #1a1a2e;
    color: #ccc;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 0.75rem;
    cursor: pointer;
    text-align: left;
  }
  #dev-panel button:hover { background: #0f3460; color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>

<div id="left">
  <div id="cookie-count">0 bones</div>
  <div id="cps">0 per second</div>
  <button id="cookie-btn" title="Click me!">🐕</button>
  <div id="multiplier-info">Fetch power: <span id="click-power">1</span></div>
  <button id="ach-btn">Achievements: <span id="ach-count">0</span> / 15</button>
</div>

<div id="toast">
  <div id="toast-icon">🏅</div>
  <div id="toast-text"><strong id="toast-name"></strong><span id="toast-desc"></span></div>
</div>

<div id="ach-overlay">
  <div id="ach-modal">
    <div id="ach-modal-header">
      <span>Achievements (<span id="ach-modal-count">0</span> / 15)</span>
      <button id="ach-close">✕</button>
    </div>
    <div id="ach-list"></div>
  </div>
</div>

<div id="right">
  <h2>Shop</h2>
  <div id="upgrades">
    <div class="section-title">Upgrades</div>
    <div id="upgrade-list"></div>
  </div>
  <div id="buildings">
    <div class="section-title">Buildings</div>
    <div id="building-list"></div>
  </div>
</div>

<button id="dev-btn">dev</button>
<div id="dev-panel">
  <button onclick="devAdd(1000)">+1,000 bones</button>
  <button onclick="devAdd(100000)">+100,000 bones</button>
  <button onclick="devAdd(1e7)">+10 million bones</button>
  <button onclick="devMaxBuildings()">Max all buildings</button>
  <button onclick="devAllAchievements()">Unlock all achievements</button>
  <button onclick="devReset()">Reset game</button>
</div>

<script>
const state = {
  bones: 0,
  totalEarned: 0,
  clicks: 0,
  clickPower: 1,
  cps: 0,
  buildings: {},
  upgrades: {},
  earned: new Set(),
};

// ── Buildings ──────────────────────────────────────────────
const BUILDINGS = [
  { id: 'puppy',     icon: '🐶', name: 'Puppy',          desc: 'Fetches bones on its own.',      baseCost: 15,    baseCps: 0.1 },
  { id: 'walker',    icon: '🦮', name: 'Dog Walker',      desc: 'Walks dogs, finds bones.',       baseCost: 100,   baseCps: 0.5 },
  { id: 'park',      icon: '🌳', name: 'Dog Park',        desc: 'Dogs dig up buried bones.',      baseCost: 500,   baseCps: 2 },
  { id: 'kennel',    icon: '🏠', name: 'Kennel',          desc: 'Houses a pack of diggers.',      baseCost: 3000,  baseCps: 10 },
  { id: 'shelter',   icon: '🏥', name: 'Dog Shelter',     desc: 'Rescue dogs hunt for bones.',    baseCost: 10000, baseCps: 40 },
  { id: 'show',      icon: '🏆', name: 'Dog Show',        desc: 'Prize pups win bones.',          baseCost: 50000, baseCps: 200 },
  { id: 'army',      icon: '🐺', name: 'Wolf Pack',       desc: 'An unstoppable bone machine.',   baseCost: 200000,baseCps: 1000 },
];

// ── Upgrades ──────────────────────────────────────────────
const UPGRADES = [
  { id: 'better_click', icon: '🐾', name: 'Better Paws',     desc: '+1 fetch power',              cost: 50,    unlockAt: () => state.totalEarned >= 50,    apply: () => { state.clickPower += 1; } },
  { id: 'double_click', icon: '💥', name: 'Power Fetch',     desc: 'Double your fetch power',     cost: 500,   unlockAt: () => state.totalEarned >= 500,   apply: () => { state.clickPower *= 2; } },
  { id: 'cps_boost',    icon: '⚡', name: 'Turbo Tail',      desc: 'All dogs +50% bones/sec',     cost: 2000,  unlockAt: () => state.cps >= 5,             apply: () => { cpsMult *= 1.5; recalcCps(); } },
  { id: 'mega_click',   icon: '🌟', name: 'Mega Fetch',      desc: '+10 fetch power',             cost: 10000, unlockAt: () => state.totalEarned >= 10000, apply: () => { state.clickPower += 10; } },
  { id: 'bone_storm',   icon: '🌪️', name: 'Bone Storm',     desc: 'All dogs +100% bones/sec',    cost: 50000, unlockAt: () => state.cps >= 50,            apply: () => { cpsMult *= 2; recalcCps(); } },
  { id: 'hyper_click',  icon: '💎', name: 'Ultra Woof',      desc: 'Triple your fetch power',     cost: 200000,unlockAt: () => state.totalEarned >= 200000,apply: () => { state.clickPower *= 3; } },
];

let cpsMult = 1;

// ── Achievements ───────────────────────────────────────────
const ACHIEVEMENTS = [
  // Bones earned
  { id: 'first_bone',   icon: '🦴', name: 'First Bone',       desc: 'Earn your first bone',              check: () => state.totalEarned >= 1 },
  { id: 'bones_1k',     icon: '💰', name: 'Bone Collector',   desc: 'Earn 1,000 bones total',            check: () => state.totalEarned >= 1000 },
  { id: 'bones_100k',   icon: '💎', name: 'Bone Hoarder',     desc: 'Earn 100,000 bones total',          check: () => state.totalEarned >= 100000 },
  { id: 'bones_1m',     icon: '👑', name: 'Bone Baron',       desc: 'Earn 1,000,000 bones total',        check: () => state.totalEarned >= 1000000 },
  { id: 'bones_1b',     icon: '🌌', name: 'Bone Billionaire', desc: 'Earn 1 billion bones total',        check: () => state.totalEarned >= 1e9 },
  // Clicks
  { id: 'click_1',      icon: '🐾', name: 'First Fetch',      desc: 'Click the dog for the first time',  check: () => state.clicks >= 1 },
  { id: 'click_100',    icon: '🐕', name: 'Click Happy',      desc: 'Click 100 times',                   check: () => state.clicks >= 100 },
  { id: 'click_1k',     icon: '🐩', name: 'Fetch Fanatic',    desc: 'Click 1,000 times',                 check: () => state.clicks >= 1000 },
  { id: 'click_10k',    icon: '🦊', name: 'Click Machine',    desc: 'Click 10,000 times',                check: () => state.clicks >= 10000 },
  // Buildings
  { id: 'first_dog',    icon: '🏠', name: 'Dog Owner',        desc: 'Buy your first building',           check: () => totalBuildings() >= 1 },
  { id: 'bldg_10',      icon: '🌳', name: 'Pack Leader',      desc: 'Own 10 buildings total',            check: () => totalBuildings() >= 10 },
  { id: 'bldg_50',      icon: '🏆', name: 'Kennel Master',    desc: 'Own 50 buildings total',            check: () => totalBuildings() >= 50 },
  // CPS
  { id: 'cps_1',        icon: '⚡', name: 'Passive Pup',      desc: 'Reach 1 bone per second',           check: () => state.cps >= 1 },
  { id: 'cps_100',      icon: '🌪️', name: 'Bone Machine',    desc: 'Reach 100 bones per second',        check: () => state.cps >= 100 },
  // Upgrades
  { id: 'first_upg',    icon: '✨', name: 'Upgrade Hound',    desc: 'Buy your first upgrade',            check: () => Object.values(state.upgrades).some(v => v) },
];

// init building counts
BUILDINGS.forEach(b => state.buildings[b.id] = 0);
UPGRADES.forEach(u => state.upgrades[u.id] = false);

function buildingCost(b) {
  const owned = state.buildings[b.id];
  return Math.ceil(b.baseCost * Math.pow(1.15, owned));
}

function recalcCps() {
  state.cps = BUILDINGS.reduce((sum, b) => {
    return sum + b.baseCps * state.buildings[b.id] * cpsMult;
  }, 0);
}

function totalBuildings() {
  return BUILDINGS.reduce((sum, b) => sum + state.buildings[b.id], 0);
}

function fmt(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(2) + ' trillion';
  if (n >= 1e9)  return (n / 1e9).toFixed(2) + ' billion';
  if (n >= 1e6)  return (n / 1e6).toFixed(2) + ' million';
  if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'k';
  return Math.floor(n).toString();
}

// ── Achievement helpers ────────────────────────────────────
let toastTimer = null;
function showToast(ach) {
  document.getElementById('toast-icon').textContent = ach.icon;
  document.getElementById('toast-name').textContent = ach.name;
  document.getElementById('toast-desc').textContent = ach.desc;
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function checkAchievements() {
  let newUnlock = false;
  ACHIEVEMENTS.forEach(a => {
    if (!state.earned.has(a.id) && a.check()) {
      state.earned.add(a.id);
      showToast(a);
      newUnlock = true;
    }
  });
  if (newUnlock) renderAchievementCount();
}

function renderAchievementCount() {
  const n = state.earned.size;
  document.getElementById('ach-count').textContent = n;
  document.getElementById('ach-modal-count').textContent = n;
}

function renderAchievementsModal() {
  const list = document.getElementById('ach-list');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const earned = state.earned.has(a.id);
    const card = document.createElement('div');
    card.className = 'ach-card ' + (earned ? 'earned' : 'locked');
    card.innerHTML = `
      <div class="ach-card-icon">${a.icon}</div>
      <div>
        <div class="ach-card-name">${earned ? a.name : '???'}</div>
        <div class="ach-card-desc">${earned ? a.desc : 'Not yet unlocked'}</div>
      </div>`;
    list.appendChild(card);
  });
  renderAchievementCount();
}

// ── Render ─────────────────────────────────────────────────
function renderBuildings() {
  const list = document.getElementById('building-list');
  list.innerHTML = '';
  BUILDINGS.forEach(b => {
    const cost = buildingCost(b);
    const owned = state.buildings[b.id];
    const canAfford = state.bones >= cost;
    const div = document.createElement('div');
    div.className = 'item' + (canAfford ? '' : ' locked');
    div.innerHTML = `
      <div class="item-icon">${b.icon}</div>
      <div class="item-info">
        <div class="item-name">${b.name}</div>
        <div class="item-desc">${b.desc} &nbsp;(${b.baseCps}/s each)</div>
      </div>
      <div>
        <div class="item-cost">${fmt(cost)} 🦴</div>
        <div class="item-owned">owned: ${owned}</div>
      </div>`;
    div.addEventListener('click', () => buyBuilding(b));
    list.appendChild(div);
  });
}

function renderUpgrades() {
  const list = document.getElementById('upgrade-list');
  list.innerHTML = '';
  UPGRADES.forEach(u => {
    if (state.upgrades[u.id]) return; // already bought, hide
    if (!u.unlockAt()) return;        // not unlocked yet, hide
    const canAfford = state.bones >= u.cost;
    const div = document.createElement('div');
    div.className = 'item' + (canAfford ? '' : ' locked');
    div.innerHTML = `
      <div class="item-icon">${u.icon}</div>
      <div class="item-info">
        <div class="item-name">${u.name}</div>
        <div class="item-desc">${u.desc}</div>
      </div>
      <div class="item-cost">${fmt(u.cost)} 🦴</div>`;
    div.addEventListener('click', () => buyUpgrade(u));
    list.appendChild(div);
  });
}

function renderStats() {
  document.getElementById('cookie-count').textContent = fmt(state.bones) + ' bones';
  document.getElementById('cps').textContent = state.cps.toFixed(1) + ' per second';
  document.getElementById('click-power').textContent = state.clickPower;
}

function render() {
  renderStats();
  renderBuildings();
  renderUpgrades();
}

// ── Actions ────────────────────────────────────────────────
function buyBuilding(b) {
  const cost = buildingCost(b);
  if (state.bones < cost) return;
  state.bones -= cost;
  state.buildings[b.id]++;
  recalcCps();
  render();
}

function buyUpgrade(u) {
  if (state.upgrades[u.id] || state.bones < u.cost) return;
  state.bones -= u.cost;
  state.upgrades[u.id] = true;
  u.apply();
  render();
}

// ── Click ──────────────────────────────────────────────────
document.getElementById('cookie-btn').addEventListener('click', (e) => {
  state.clicks++;
  const gained = state.clickPower;
  state.bones += gained;
  state.totalEarned += gained;
  render();

  // floating pop
  const pop = document.createElement('div');
  pop.className = 'pop';
  pop.textContent = '+' + gained;
  pop.style.left = (e.clientX - 15) + 'px';
  pop.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
});

// ── Game Loop ──────────────────────────────────────────────
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const dt = (now - lastTick) / 1000;
  lastTick = now;

  if (state.cps > 0) {
    const gained = state.cps * dt;
    state.bones += gained;
    state.totalEarned += gained;
    renderStats();
    // only re-render shop every ~1s to avoid thrash
  }
  requestAnimationFrame(tick);
}

// Periodic full render + achievement checks
setInterval(() => { render(); checkAchievements(); }, 1000);

render();
tick();

// ── Achievement modal wiring ───────────────────────────────
document.getElementById('ach-btn').addEventListener('click', () => {
  renderAchievementsModal();
  document.getElementById('ach-overlay').classList.add('open');
});
document.getElementById('ach-close').addEventListener('click', () => {
  document.getElementById('ach-overlay').classList.remove('open');
});
document.getElementById('ach-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('ach-overlay'))
    document.getElementById('ach-overlay').classList.remove('open');
});

// ── Dev Mode ───────────────────────────────────────────────
const devBtn = document.getElementById('dev-btn');
const devPanel = document.getElementById('dev-panel');
devBtn.addEventListener('click', () => {
  devPanel.style.display = devPanel.style.display === 'flex' ? 'none' : 'flex';
});

function devAdd(n) {
  state.bones += n;
  state.totalEarned += n;
  render();
}
function devMaxBuildings() {
  BUILDINGS.forEach(b => { state.buildings[b.id] = 50; });
  recalcCps();
  render();
}
function devAllAchievements() {
  ACHIEVEMENTS.forEach(a => state.earned.add(a.id));
  renderAchievementCount();
}
function devReset() {
  state.bones = 0;
  state.totalEarned = 0;
  state.clickPower = 1;
  state.cps = 0;
  state.clicks = 0;
  BUILDINGS.forEach(b => state.buildings[b.id] = 0);
  UPGRADES.forEach(u => state.upgrades[u.id] = false);
  state.earned.clear();
  cpsMult = 1;
  recalcCps();
  render();
  renderAchievementCount();
}
</script>
</body>
</html>
