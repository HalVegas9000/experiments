<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦕 Dino Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:  #2e7d32;
    --green-main:  #43a047;
    --green-mid:   #66bb6a;
    --green-light: #a5d6a7;
    --green-pale:  #f1f9f1;
    --lime:        #aeea00;
    --lime-soft:   #dcedc8;
    --yellow:      #fdd835;
    --yellow-pale: #fff9c4;
    --orange:      #fb8c00;
    --teal:        #00acc1;
    --teal-pale:   #e0f7fa;
    --coral:       #ff7043;
    --coral-pale:  #fbe9e7;
    --purple:      #8e24aa;
    --text-dark:   #1b5e20;
    --text-mid:    #33691e;
    --shadow-green: rgba(67,160,71,.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Nunito", system-ui, sans-serif;
    background-color: #e8f5e9;
    background-image:
      radial-gradient(ellipse 60% 40% at 10% 90%, rgba(174,234,0,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 90% 10%, rgba(0,172,193,.12) 0%, transparent 60%);
    background-attachment: fixed;
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ------------------------------------------------------------------ */
  /* HEADER                                                              */
  /* ------------------------------------------------------------------ */
  header {
    background: linear-gradient(120deg, #1b5e20 0%, #2e7d32 40%, #388e3c 70%, #43a047 100%);
    padding: 1rem 2rem;
    box-shadow: 0 6px 20px rgba(27,94,32,.4);
    position: relative;
    overflow: hidden;
  }

  /* decorative leaf spots */
  header::before, header::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    opacity: .12;
  }
  header::before {
    width: 220px; height: 220px;
    background: #aeea00;
    top: -80px; right: 140px;
  }
  header::after {
    width: 140px; height: 140px;
    background: #fdd835;
    bottom: -60px; left: 80px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header-title {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
  }

  .header-title h1 {
    font-size: 2rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 3px 8px rgba(0,0,0,.3), 0 0 30px rgba(174,234,0,.3);
    letter-spacing: .04em;
  }

  .header-title .tagline {
    font-size: .9rem;
    font-weight: 700;
    color: #c8e6c9;
    letter-spacing: .06em;
    margin-top: .15rem;
  }

  .header-dino {
    font-size: 3rem;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.3));
    animation: dino-bob 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  .header-dino.flip { transform: scaleX(-1); animation-delay: .6s; }

  @keyframes dino-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .header-dino.flip {
    animation: dino-bob-flip 2.5s ease-in-out infinite .6s;
  }
  @keyframes dino-bob-flip {
    0%, 100% { transform: scaleX(-1) translateY(0); }
    50%       { transform: scaleX(-1) translateY(-6px); }
  }

  /* ------------------------------------------------------------------ */
  /* LAYOUT                                                              */
  /* ------------------------------------------------------------------ */
  .layout {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 1.5rem;
    padding: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ------------------------------------------------------------------ */
  /* FORM PANEL                                                          */
  /* ------------------------------------------------------------------ */
  .panel {
    background: #fff;
    border-radius: 24px;
    padding: 1.5rem;
    box-shadow: 0 8px 28px var(--shadow-green);
    align-self: start;
    border: 3px solid var(--green-light);
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: "🌿";
    position: absolute;
    top: -4px; right: 10px;
    font-size: 2.5rem;
    opacity: .18;
    transform: rotate(-20deg);
    pointer-events: none;
  }

  .panel h2 {
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 1.2rem;
    color: var(--green-dark);
    display: flex;
    align-items: center;
    gap: .4rem;
    padding-bottom: .7rem;
    border-bottom: 3px dashed var(--lime-soft);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .6rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: .25rem;
    margin-bottom: .65rem;
  }

  label {
    font-size: .75rem;
    font-weight: 800;
    color: var(--green-main);
    text-transform: uppercase;
    letter-spacing: .07em;
  }

  input, textarea {
    border: 2.5px solid var(--green-light);
    border-radius: 12px;
    padding: .45rem .75rem;
    font-size: .92rem;
    font-family: "Nunito", system-ui, sans-serif;
    font-weight: 600;
    transition: border-color .15s, box-shadow .15s, background .15s;
    width: 100%;
    background: var(--green-pale);
    color: var(--text-dark);
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--green-main);
    box-shadow: 0 0 0 4px rgba(67,160,71,.15);
    background: #fff;
  }

  input::placeholder, textarea::placeholder {
    color: #a5d6a7;
    font-weight: 600;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
  }

  /* ------------------------------------------------------------------ */
  /* BUTTONS                                                             */
  /* ------------------------------------------------------------------ */
  button {
    cursor: pointer;
    border: none;
    border-radius: 999px;
    padding: .5rem 1.1rem;
    font-size: .88rem;
    font-weight: 800;
    font-family: "Nunito", system-ui, sans-serif;
    letter-spacing: .03em;
    transition: transform .12s, box-shadow .15s;
  }

  button:hover  { transform: translateY(-2px); }
  button:active { transform: translateY(0) scale(.97); }

  .btn-row {
    display: flex;
    gap: .6rem;
    margin-top: .9rem;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--green-main), var(--green-mid));
    color: #fff;
    flex: 1;
    box-shadow: 0 5px 14px rgba(67,160,71,.4);
    border: 2px solid var(--green-dark);
  }

  .btn-secondary {
    background: #f5f5f5;
    color: #666;
    border: 2px solid #ddd;
    box-shadow: 0 3px 8px rgba(0,0,0,.08);
  }

  .btn-edit {
    background: linear-gradient(135deg, var(--teal), #26c6da);
    color: #fff;
    border: 2px solid #00838f;
    box-shadow: 0 4px 12px rgba(0,172,193,.35);
  }

  .btn-danger {
    background: linear-gradient(135deg, var(--coral), #ff8a65);
    color: #fff;
    border: 2px solid #bf360c;
    box-shadow: 0 4px 12px rgba(255,112,67,.35);
  }

  /* ------------------------------------------------------------------ */
  /* VALIDATE ROW                                                        */
  /* ------------------------------------------------------------------ */
  .addr-validate-row {
    display: flex;
    align-items: center;
    gap: .7rem;
    margin-bottom: .7rem;
  }

  .btn-validate {
    background: linear-gradient(135deg, var(--yellow), #ffee58);
    color: var(--text-dark);
    border: 2px solid #f9a825;
    box-shadow: 0 4px 12px rgba(253,216,53,.45);
    font-size: .82rem;
    padding: .42rem .9rem;
    white-space: nowrap;
    border-radius: 999px;
  }

  .btn-validate:hover  { transform: translateY(-2px); }
  .btn-validate:active { transform: translateY(0) scale(.97); }

  .btn-validate:disabled {
    opacity: .6;
    cursor: wait;
    transform: none;
  }

  #addr-status {
    font-size: .82rem;
    font-weight: 800;
  }
  #addr-status.ok  { color: var(--green-main); }
  #addr-status.err { color: var(--coral); }

  /* ------------------------------------------------------------------ */
  /* FLASH                                                               */
  /* ------------------------------------------------------------------ */
  .flash {
    padding: .65rem 1rem;
    border-radius: 14px;
    font-size: .9rem;
    font-weight: 800;
    margin-bottom: .8rem;
    display: none;
    border: 2.5px solid transparent;
  }

  .flash.success {
    background: var(--lime-soft);
    color: var(--green-dark);
    border-color: var(--green-light);
  }

  .flash.error {
    background: var(--coral-pale);
    color: #bf360c;
    border-color: #ffccbc;
  }

  /* ------------------------------------------------------------------ */
  /* LIST PANEL                                                          */
  /* ------------------------------------------------------------------ */
  .list-panel { display: flex; flex-direction: column; gap: 1rem; }

  .search-bar {
    display: flex;
    gap: .6rem;
  }

  .search-bar input { flex: 1; }

  /* ------------------------------------------------------------------ */
  /* STATS CHIPS                                                         */
  /* ------------------------------------------------------------------ */
  .stats-bar {
    display: flex;
    gap: .75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: #fff;
    border: 2.5px solid var(--green-light);
    border-radius: 999px;
    padding: .35rem 1rem;
    font-size: .85rem;
    font-weight: 800;
    color: var(--green-dark);
    box-shadow: 0 3px 10px var(--shadow-green);
    display: flex;
    align-items: center;
    gap: .4rem;
  }

  /* ------------------------------------------------------------------ */
  /* CONTACT TABLE                                                       */
  /* ------------------------------------------------------------------ */
  .contact-list {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 28px var(--shadow-green);
    overflow: hidden;
    border: 3px solid var(--green-light);
  }

  .contact-list table {
    width: 100%;
    border-collapse: collapse;
  }

  .contact-list thead {
    background: linear-gradient(90deg, var(--green-dark), var(--green-main));
  }

  .contact-list th {
    padding: .85rem 1rem;
    text-align: left;
    font-size: .78rem;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #e8f5e9;
  }

  .contact-list td {
    padding: .8rem 1rem;
    font-size: .9rem;
    font-weight: 600;
    border-bottom: 2px dashed var(--lime-soft);
    vertical-align: middle;
    color: var(--text-dark);
  }

  .contact-list tr:last-child td { border-bottom: none; }

  .contact-list tbody tr:nth-child(even) td { background: var(--green-pale); }

  .contact-list tr:hover td {
    background: var(--lime-soft) !important;
  }

  .contact-list tr.selected td {
    background: #c8e6c9 !important;
    border-left: 4px solid var(--green-main);
  }

  .contact-list a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 700;
  }
  .contact-list a:hover { text-decoration: underline; }

  .action-btn {
    padding: .3rem .75rem;
    font-size: .78rem;
  }

  .empty-msg {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--green-light);
    font-size: 1rem;
    font-weight: 800;
  }

  .empty-msg .empty-dino {
    display: block;
    font-size: 3rem;
    margin-bottom: .5rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-dino">🦕</span>
    <div class="header-title">
      <h1>Dino Directory</h1>
      <p class="tagline">Roar-ganize your prehistoric pals!</p>
    </div>
    <span class="header-dino flip">🦖</span>
  </div>
</header>

<div class="layout">

  <!-- Form Panel -->
  <div class="panel">
    <h2 id="form-title">🦕 Add a New Pal</h2>
    <div class="flash" id="flash"></div>

    <div class="form-row">
      <div class="form-group">
        <label for="first_name">First Name *</label>
        <input type="text" id="first_name" placeholder="Jane" autocapitalize="words"
               oninput="capWords(this)">
      </div>
      <div class="form-group">
        <label for="last_name">Last Name *</label>
        <input type="text" id="last_name" placeholder="Doe" autocapitalize="words"
               oninput="capWords(this)">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jane@example.com">
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" placeholder="(555) 123-4567"
             oninput="formatPhone(this)" maxlength="14">
    </div>

    <div class="form-group">
      <label for="address">Street Address</label>
      <input type="text" id="address" placeholder="123 Main St" autocapitalize="words"
             oninput="capWords(this)">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" placeholder="Springfield" autocapitalize="words"
               oninput="capWords(this)">
      </div>
      <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" placeholder="IL" autocapitalize="characters"
               oninput="capWords(this)">
      </div>
    </div>

    <div class="form-group">
      <label for="zip">ZIP Code</label>
      <input type="text" id="zip" placeholder="62701" maxlength="10">
    </div>

    <div class="addr-validate-row">
      <button type="button" class="btn-validate" onclick="validateAddress()" id="validate-btn">
        🗺️ Verify Address
      </button>
      <span id="addr-status"></span>
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Any extra dino details..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="saveContact()">🦕 Save Pal</button>
      <button class="btn-secondary" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <!-- Contact List -->
  <div class="list-panel">
    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍 Search the herd..."
             oninput="loadContacts()">
      <button class="btn-secondary" onclick="document.getElementById('search').value=''; loadContacts()">Clear</button>
    </div>

    <div class="stats-bar">
      <div class="stat-chip">
        🦶 <span id="stat-total">Loading herd...</span>
      </div>
      <div class="stat-chip" id="stat-filtered-chip" style="display:none">
        🌿 <span id="stat-filtered"></span>
      </div>
    </div>

    <div class="contact-list">
      <table>
        <thead>
          <tr>
            <th>🦕 Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>City</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="contact-tbody">
          <tr>
            <td colspan="5" class="empty-msg">
              <span class="empty-dino">🦕</span>
              Loading the herd...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let editingId = null;

  // --- Phone formatter: (XXX) XXX-XXXX ---
  function formatPhone(input) {
    const digits = input.value.replace(/\D/g, "").slice(0, 10);
    let fmt = "";
    if (digits.length === 0)       fmt = "";
    else if (digits.length <= 3)   fmt = "(" + digits;
    else if (digits.length <= 6)   fmt = "(" + digits.slice(0,3) + ") " + digits.slice(3);
    else fmt = "(" + digits.slice(0,3) + ") " + digits.slice(3,6) + "-" + digits.slice(6);
    input.value = fmt;
  }

  // --- Address validation via Census Geocoder ---
  async function validateAddress() {
    const btn    = document.getElementById("validate-btn");
    const status = document.getElementById("addr-status");
    const street = document.getElementById("address").value.trim();
    const city   = document.getElementById("city").value.trim();
    const state  = document.getElementById("state").value.trim();
    const zip    = document.getElementById("zip").value.trim();

    if (!street && !city && !zip) {
      status.textContent = "Enter an address first!";
      status.className = "err";
      return;
    }

    btn.disabled = true;
    status.textContent = "🔍 Checking...";
    status.className = "";

    try {
      const res = await fetch("/validate-address", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address: street, city, state, zip })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        status.textContent = "😬 " + (data.error || "Not found.");
        status.className = "err";
      } else {
        document.getElementById("address").value = data.address;
        document.getElementById("city").value    = data.city;
        document.getElementById("state").value   = data.state;
        document.getElementById("zip").value     = data.zip;
        status.textContent = "✅ Verified!";
        status.className = "ok";
      }
    } catch (e) {
      status.textContent = "🌩️ Network error.";
      status.className = "err";
    } finally {
      btn.disabled = false;
    }
  }

  // --- Auto-capitalize: first letter of each word ---
  function capWords(input) {
    const pos = input.selectionStart;
    input.value = input.value.replace(/\b([a-z])/g, ch => ch.toUpperCase());
    input.setSelectionRange(pos, pos);
  }

  // --- Stats ---
  async function updateStats(visibleCount) {
    const res = await fetch("/stats");
    const { total } = await res.json();
    const q = document.getElementById("search").value.trim();

    document.getElementById("stat-total").textContent =
      `${total} pal${total !== 1 ? "s" : ""} in the herd`;

    const chip = document.getElementById("stat-filtered-chip");
    if (q) {
      document.getElementById("stat-filtered").textContent =
        `${visibleCount} match${visibleCount !== 1 ? "es" : ""} for "${q}"`;
      chip.style.display = "flex";
    } else {
      chip.style.display = "none";
    }
  }

  // --- Load contacts ---
  async function loadContacts() {
    const q = document.getElementById("search").value.trim();
    const res = await fetch("/contacts" + (q ? `?search=${encodeURIComponent(q)}` : ""));
    const contacts = await res.json();
    const tbody = document.getElementById("contact-tbody");

    updateStats(contacts.length);

    if (contacts.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="5" class="empty-msg">
          <span class="empty-dino">🦕</span>
          No prehistoric pals found!
        </td></tr>`;
      return;
    }

    tbody.innerHTML = contacts.map(c => `
      <tr id="row-${c.id}" class="${editingId === c.id ? "selected" : ""}">
        <td><strong>${esc(c.first_name)} ${esc(c.last_name)}</strong></td>
        <td>${c.email
          ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`
          : `<span style="color:var(--green-light)">—</span>`}</td>
        <td>${c.phone || `<span style="color:var(--green-light)">—</span>`}</td>
        <td>${c.city
          ? esc(c.city) + (c.state ? ", " + esc(c.state) : "")
          : `<span style="color:var(--green-light)">—</span>`}</td>
        <td style="white-space:nowrap;display:flex;gap:.35rem">
          <button class="btn-edit action-btn" onclick="editContact(${c.id})">✏️ Edit</button>
          <button class="btn-danger action-btn" onclick="deleteContact(${c.id}, '${esc(c.first_name)} ${esc(c.last_name)}')">🦖 Stomp</button>
        </td>
      </tr>
    `).join("");
  }

  async function saveContact() {
    const data = getFormData();
    if (!data.first_name || !data.last_name) {
      showFlash("🦖 First and last name are required!", "error");
      return;
    }

    let res;
    if (editingId) {
      res = await fetch(`/contacts/${editingId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    } else {
      res = await fetch("/contacts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
    }

    if (res.ok) {
      showFlash(editingId ? "🦕 Pal updated!" : "🥳 New pal added to the herd!", "success");
      clearForm();
      loadContacts();
    } else {
      showFlash("😬 Something went wrong. Try again!", "error");
    }
  }

  async function editContact(id) {
    const res = await fetch(`/contacts/${id}`);
    const c = await res.json();
    editingId = id;
    document.getElementById("form-title").innerHTML = "✏️ Edit Pal";
    ["first_name","last_name","email","phone","address","city","state","zip","notes"]
      .forEach(f => document.getElementById(f).value = c[f] || "");
    document.getElementById("addr-status").textContent = "";
    loadContacts();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function deleteContact(id, name) {
    if (!confirm(`Stomp "${name}" out of the herd? 🦖`)) return;
    const res = await fetch(`/contacts/${id}`, { method: "DELETE" });
    if (res.ok) {
      if (editingId === id) clearForm();
      showFlash(`🦖 "${name}" has been stomped!`, "success");
      loadContacts();
    }
  }

  function clearForm() {
    editingId = null;
    document.getElementById("form-title").innerHTML = "🦕 Add a New Pal";
    ["first_name","last_name","email","phone","address","city","state","zip","notes"]
      .forEach(f => document.getElementById(f).value = "");
    document.getElementById("addr-status").textContent = "";
    loadContacts();
  }

  function getFormData() {
    return Object.fromEntries(
      ["first_name","last_name","email","phone","address","city","state","zip","notes"]
        .map(f => [f, document.getElementById(f).value.trim()])
    );
  }

  function showFlash(msg, type) {
    const el = document.getElementById("flash");
    el.textContent = msg;
    el.className = `flash ${type}`;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3500);
  }

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  loadContacts();
</script>
</body>
</html>
